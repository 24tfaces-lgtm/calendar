




<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ФРД — календарь рабочего дня</title>
  <style>
    :root {
      --bg: #eff4fb;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --line: #dbe6f1;
      --line-strong: #c5d4e3;
      --text: #0f172a;
      --muted: #64748b;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --time-col: 84px;
      --hours: 9;
      --hour-height: 72px;
      --gap: 12px;
      --accent: #2563eb;
      --danger: #b91c1c;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.08), transparent 24%),
        linear-gradient(180deg, #eef4fb 0%, #f8fbff 100%);
      color: var(--text);
    }

    button, select, input { font: inherit; }

    .app {
      min-height: 100vh;
      padding: 20px;
      display: grid;
      gap: 18px;
    }

    .topbar,
    .summary-strip,
    .board {
      background: var(--panel);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .topbar-row {
      display: grid;
      gap: 12px;
      align-items: end;
    }

    .topbar-row.primary {
      grid-template-columns: minmax(160px, 220px) minmax(280px, 1.15fr) minmax(240px, 0.85fr) minmax(320px, 1fr);
    }

    .topbar-row.secondary {
      grid-template-columns: minmax(520px, 1fr) minmax(300px, 420px);
      align-items: start;
    }

    .brand-block {
      padding: 14px 16px;
      border-radius: 20px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .brand-kicker {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .brand-block h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1;
    }

    .brand-note {
      font-size: 13px;
      font-weight: 500;
      opacity: 0.8;
    }

    .control-group {
      border: 1px solid #e5edf5;
      border-radius: 20px;
      padding: 12px;
      background: var(--panel-soft);
      min-height: 100%;
    }

    .group-title {
      display: block;
      margin-bottom: 10px;
      padding-left: 2px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .trainer-tabs,
    .view-tabs,
    .nav-controls {
      display: grid;
      gap: 8px;
    }

    .trainer-tabs { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .view-tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .nav-controls { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .nav-stack {
      display: grid;
      gap: 8px;
    }

    .preset-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .secondary-actions {
      display: grid;
      grid-template-columns: minmax(140px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .field-wrap {
      display: grid;
      gap: 8px;
    }

    .field-label {
      display: block;
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .tab-btn,
    .preset-btn,
    .action-btn,
    .nav-btn,
    select,
    input[type="date"] {
      width: 100%;
      border: 1px solid #d7e4ef;
      background: #fff;
      border-radius: var(--radius-md);
      padding: 12px 14px;
      transition: 0.18s ease;
      min-height: 46px;
    }

    .tab-btn,
    .preset-btn,
    .action-btn,
    .nav-btn {
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
    }

    .tab-btn:hover,
    .preset-btn:hover,
    .action-btn:hover,
    .nav-btn:hover,
    select:hover,
    input[type="date"]:hover {
      transform: translateY(-1px);
      border-color: #b8cbe0;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
    }

    .tab-btn.active,
    .preset-btn.active {
      border-color: transparent;
      background: #f8fbff;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.16);
    }

    .tab-btn small {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
    }

    .tab-btn.active small {
      color: var(--text);
    }

    .preset-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
    }

    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.45);
    }

    .summary-strip {
      padding: 14px 16px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .summary-item,
    .summary-total,
    .empty-note {
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid #e7eef6;
      background: #fff;
      font-size: 14px;
    }

    .summary-item,
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .summary-total {
      font-weight: 800;
      background: #f8fbff;
    }

    .summary-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .action-btn.warn {
      color: var(--danger);
      background: #fff5f5;
      border-color: #fecaca;
      white-space: nowrap;
    }

    .board {
      padding: 18px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .board-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .board-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .board-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .week-header,
    .day-header-row {
      display: grid;
      gap: var(--gap);
      min-width: 980px;
    }

    .week-header {
      grid-template-columns: var(--time-col) repeat(var(--cols), minmax(180px, 1fr));
    }

    .day-header-row {
      grid-template-columns: var(--time-col) minmax(260px, 1fr);
      min-width: 440px;
    }

    .day-header,
    .time-head,
    .month-weekday {
      border-radius: 16px;
      background: #f7faff;
      border: 1px solid #e3edf6;
      padding: 14px 16px;
      font-weight: 700;
    }

    .time-head {
      color: var(--muted);
      font-weight: 700;
      text-align: center;
    }

    .day-header small {
      display: block;
      margin-top: 4px;
      font-weight: 600;
      color: var(--muted);
    }

    .grid-wrap {
      display: grid;
      grid-template-columns: var(--time-col) 1fr;
      gap: var(--gap);
    }

    .time-axis {
      position: relative;
      height: calc(var(--hours) * var(--hour-height));
      border-radius: 18px;
      background: linear-gradient(180deg, #fafcff 0%, #f4f8fc 100%);
      border: 1px solid #e3edf6;
    }

    .time-label {
      position: absolute;
      left: 0;
      width: 100%;
      transform: translateY(-50%);
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .days-grid {
      display: grid;
      gap: var(--gap);
      min-width: 980px;
    }

    .days-grid.week {
      grid-template-columns: repeat(var(--cols), minmax(180px, 1fr));
    }

    .days-grid.day {
      grid-template-columns: minmax(260px, 1fr);
      min-width: 360px;
    }

    .day-column {
      position: relative;
      height: calc(var(--hours) * var(--hour-height));
      border-radius: 18px;
      border: 1px solid #dfe9f3;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(148, 163, 184, 0.18) 0,
          rgba(148, 163, 184, 0.18) 1px,
          transparent 1px,
          transparent calc(var(--hour-height) / 4)
        ),
        repeating-linear-gradient(
          to bottom,
          rgba(100, 116, 139, 0.24) 0,
          rgba(100, 116, 139, 0.24) 1.5px,
          transparent 1.5px,
          transparent var(--hour-height)
        ),
        linear-gradient(180deg, #fcfdff 0%, #f9fbfd 100%);
      overflow: visible;
      cursor: crosshair;
    }

    .day-column.weekend {
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      cursor: default;
    }

    .weekend-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #64748b;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      padding: 16px;
    }

    .slot {
      position: absolute;
      left: 8px;
      right: 8px;
      border-radius: 16px;
      padding: 10px 12px 18px;
      color: #fff;
      box-shadow: 0 12px 18px rgba(15, 23, 42, 0.18);
      cursor: grab;
      user-select: none;
      overflow: hidden;
    }

    .slot.dragging,
    .slot.resizing {
      outline: 2px solid rgba(255, 255, 255, 0.65);
      outline-offset: -2px;
      filter: saturate(1.08);
    }

    .slot:active { cursor: grabbing; }

    .slot-title {
      padding-right: 20px;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .slot-meta {
      font-size: 12px;
      opacity: 0.95;
      font-weight: 700;
    }

    .delete-btn {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: none;
      background: rgba(255, 255, 255, 0.22);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      display: grid;
      place-items: center;
      line-height: 1;
    }

    .resize-handle {
      position: absolute;
      left: 50%;
      bottom: 5px;
      transform: translateX(-50%);
      width: 46px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      cursor: ns-resize;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: var(--gap);
      min-width: 980px;
    }

    .month-weekday {
      text-align: center;
    }

    .month-cell {
      min-height: 140px;
      border-radius: 18px;
      border: 1px solid #dfe9f3;
      background: linear-gradient(180deg, #fcfdff 0%, #f9fbfd 100%);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .month-cell:hover {
      border-color: #bfd1e4;
      transform: translateY(-1px);
    }

    .month-cell.outside {
      opacity: 0.38;
    }

    .month-cell.weekend {
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
    }

    .month-cell.active {
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.16);
      border-color: transparent;
    }

    .month-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 800;
    }

    .month-total {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
    }

    .chip-list {
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .chip {
      border-radius: 12px;
      padding: 7px 9px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }


    .brand-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      font-size: 12px;
      font-weight: 700;
    }

    .meta-pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.9;
    }

    .meta-pill.online { color: #86efac; }
    .meta-pill.offline { color: #fde68a; }
    .meta-pill.error { color: #fca5a5; }

    

    .topbar-row.secondary {
      grid-template-columns: 1fr;
    }

    .presets-wide {
      min-height: auto;
    }

    .preset-list {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .slot {
      right: auto;
      padding-right: 42px;
      transition: box-shadow 0.16s ease, transform 0.16s ease;
    }

    .slot:hover {
      box-shadow: 0 16px 24px rgba(15, 23, 42, 0.22);
    }

    .slot.compact {
      padding: 8px 36px 12px 10px;
    }

    .slot.compact .slot-title {
      font-size: 13px;
      margin-bottom: 3px;
    }

    .slot.compact .slot-meta {
      font-size: 11px;
    }

    .slot-title {
      padding-right: 0;
      cursor: text;
      word-break: break-word;
    }

    .slot-title-input {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 3px 6px;
      font: inherit;
      font-weight: 800;
      color: #0f172a;
    }

    .slot-title-input:focus {
      outline: 2px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.12);
    }

    .slot-note,
    .slot-participants {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 700;
      opacity: 0.92;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .slot-participants {
      opacity: 0.96;
    }


    .delete-btn {
      width: 28px;
      height: 28px;
      top: 8px;
      right: 8px;
      background: rgba(255, 255, 255, 0.22);
      font-size: 20px;
      line-height: 1;
    }

    .delete-btn:hover {
      background: rgba(255, 255, 255, 0.32);
    }

    .slot-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .participant-toggle-btn {
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      min-height: 28px;
    }

    .participant-toggle-btn:hover {
      background: rgba(255, 255, 255, 0.28);
    }

    .participant-viewer-list {
      display: grid;
      gap: 10px;
      max-height: 320px;
      overflow: auto;
    }

    .participant-viewer-empty {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      padding: 8px 0;
    }

    .participant-viewer-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: #f8fbff;
      border: 1px solid #e5edf5;
    }

    .participant-viewer-name {
      font-size: 14px;
      font-weight: 700;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attend-btn {
      border: 1px solid #d7e4ef;
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      min-height: 32px;
    }

    .attend-btn.active-yes {
      background: #dcfce7;
      border-color: #86efac;
      color: #166534;
    }

    .attend-btn.active-no {
      background: #fee2e2;
      border-color: #fca5a5;
      color: #991b1b;
    }

    .viewer-close-wrap {
      display: flex;
      justify-content: flex-end;
    }

    .viewer-modal {
      width: min(520px, 100%);
    }

    .participants-section-hidden {
      display: none !important;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.34);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(760px, 100%);
      max-height: min(90vh, 920px);
      overflow: auto;
      background: #fff;
      border-radius: 26px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-head h3 {
      margin: 0;
      font-size: 22px;
    }

    .modal-grid {
      display: grid;
      gap: 12px;
    }

    .modal-grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .modal-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .modal-field {
      display: grid;
      gap: 8px;
    }

    .modal-field label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .modal-field input,
    .modal-field select,
    .modal-field textarea,
    .participant-input {
      border: 1px solid #d7e4ef;
      border-radius: 14px;
      padding: 12px 14px;
      background: #fff;
      font: inherit;
      width: 100%;
    }

    .modal-field textarea {
      min-height: 92px;
      resize: vertical;
    }

    .participant-wrap {
      display: grid;
      gap: 10px;
      border: 1px solid #e4edf6;
      border-radius: 18px;
      padding: 14px;
      background: #fbfdff;
    }

    .participant-controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 34px;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: #eef4fb;
      border: 1px solid #d9e5f2;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }

    .tag-remove {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: none;
      background: #d7e4ef;
      color: #334155;
      cursor: pointer;
      line-height: 1;
      font-weight: 800;
    }

    .tag-empty {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .modal-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .modal-actions-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ghost-btn,
    .solid-btn {
      border-radius: 14px;
      padding: 12px 16px;
      border: 1px solid #d7e4ef;
      background: #fff;
      cursor: pointer;
      font-weight: 800;
      font: inherit;
    }

    .ghost-btn.warn {
      color: #b91c1c;
      background: #fff5f5;
      border-color: #fecaca;
    }

    .solid-btn {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      border-color: transparent;
    }

    .hidden {
      display: none !important;
    }


    @media (max-width: 1420px) {
      .topbar-row.primary {
        grid-template-columns: repeat(2, minmax(280px, 1fr));
      }

      .topbar-row.secondary {
        grid-template-columns: 1fr;
      }

      .preset-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .app { padding: 14px; }
      .topbar-row.primary { grid-template-columns: 1fr; }
      .trainer-tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .view-tabs,
      .nav-controls,
      .secondary-actions,
      .preset-list { grid-template-columns: 1fr; }
      .board-title { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-row primary">
        <div class="brand-block">
          <div class="brand-kicker">Фотография рабочего дня</div>

    function uid() {
      if (window.crypto && typeof crypto.randomUUID === "function") return crypto.randomUUID();
      return "slot-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function snapMinutes(value) {
      return Math.round(value / SNAP) * SNAP;
    }

    function isWeekend(date) {
      const day = date.getDay();
      return day === 0 || day === 6;
    }

    function toISO(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function parseISO(iso) {
      const [year, month, day] = String(iso || "").split("-").map(Number);
      if (!year || !month || !day) return null;
      return new Date(year, month - 1, day, 12, 0, 0, 0);
    }

    function addDays(date, days) {
      const copy = new Date(date);
      copy.setDate(copy.getDate() + days);
      return copy;
    }

    function addMonths(date, months) {
      const copy = new Date(date);
      copy.setMonth(copy.getMonth() + months);
      return copy;
    }

    function startOfWeek(date) {
      const copy = new Date(date);
      const jsDay = copy.getDay();
      const diff = jsDay === 0 ? -6 : 1 - jsDay;
      copy.setDate(copy.getDate() + diff);
      return new Date(copy.getFullYear(), copy.getMonth(), copy.getDate(), 12);
    }

    function startOfMonthGrid(date) {
      const first = new Date(date.getFullYear(), date.getMonth(), 1, 12);
      return startOfWeek(first);
    }

    function formatTime(minutesFromStart) {
      const absolute = START_HOUR * 60 + minutesFromStart;
      const h = Math.floor(absolute / 60);
      const m = absolute % 60;
      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function parseTime(text) {
      const [h, m] = String(text || "").split(":").map(Number);
      if (Number.isNaN(h) || Number.isNaN(m)) return START_HOUR * 60;
      return h * 60 + m;
    }

    function formatDuration(totalMinutes) {
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      if (h && m) return `${h} ч ${m} м`;
      if (h) return `${h} ч`;
      return `${m} м`;
    }

    function formatDateLabel(date, short = false) {
      const wd = short ? WEEKDAY_LABELS[getWeekdayIndex(date)] : WEEKDAY_LONG[getWeekdayIndex(date)];
      return `${wd}, ${String(date.getDate()).padStart(2, "0")}.${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function getWeekdayIndex(date) {
      const js = date.getDay();
      return js === 0 ? 6 : js - 1;
    }

    function getPresetById(id) {
      return PRESETS.find((preset) => preset.id === id) || PRESETS[0];
    }

    function getTrainerById(id) {
      return TRAINERS.find((trainer) => trainer.id === id) || TRAINERS[0];
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeParticipant(item) {
      if (typeof item === "string") {
        const name = item.trim();
        return name ? { name, attended: null } : null;
      }
      if (!item || typeof item !== "object") return null;
      const name = String(item.name || item.title || "").trim();
      if (!name) return null;
      const attended = item.attended === true ? true : item.attended === false ? false : null;
      return { name, attended };
    }


    function renderParticipantsViewer(slot) {
      const preset = getPresetById(slot.presetId);
      participantsViewerHeading.textContent = `${slot.title} · Участники`;
      const participants = Array.isArray(slot.participants) ? slot.participants : [];
      participantsViewerList.innerHTML = participants.length
        ? participants.map((participant, index) => `
            <div class="participant-viewer-row">
              <div class="participant-viewer-name">${escapeHtml(participant.name)}</div>
              <button class="attend-btn ${participant.attended === true ? "active-yes" : ""}" type="button" data-attend="yes" data-slot-id="${slot.id}" data-index="${index}">Был</button>
              <button class="attend-btn ${participant.attended === false ? "active-no" : ""}" type="button" data-attend="no" data-slot-id="${slot.id}" data-index="${index}">Не был</button>
            </div>
          `).join("")
        : '<div class="participant-viewer-empty">Участники не добавлены</div>';
      participantsViewerModal.classList.add("open");
      participantsViewerModal.setAttribute("aria-hidden", "false");
      participantsViewerState = { open: true, slotId: slot.id };

    function closeParticipantsViewer() {
      participantsViewerState = { open: false, slotId: null };
      participantsViewerModal.classList.remove("open");
      participantsViewerModal.setAttribute("aria-hidden", "true");
      participantsViewerList.innerHTML = "";
    }

    function getBoardId() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("board") || "main";
      return raw.trim().toLowerCase().replace(/[^a-z0-9_-]+/g, "-") || "main";
    }

    function getFallbackUiState() {
      const today = toISO(new Date());
      return {
        selectedTrainerId: TRAINERS[0].id,
        selectedPresetId: PRESETS[0].id,
        view: "week",
        cursorDate: today
      };
    }

    function loadState() {
      const fallback = getFallbackUiState();
      let ui = fallback;
      let slots = [];

      try {
        const rawUi = localStorage.getItem(UI_STORAGE_KEY);
        if (rawUi) {
          const parsed = JSON.parse(rawUi);
          ui = {
            selectedTrainerId: TRAINERS.some((item) => item.id === parsed.selectedTrainerId) ? parsed.selectedTrainerId : fallback.selectedTrainerId,
            selectedPresetId: PRESETS.some((item) => item.id === parsed.selectedPresetId) ? parsed.selectedPresetId : fallback.selectedPresetId,
            view: ["day", "week", "month"].includes(parsed.view) ? parsed.view : fallback.view,
            cursorDate: typeof parsed.cursorDate === "string" ? parsed.cursorDate : fallback.cursorDate
          };
        }
      } catch (error) {
        ui = fallback;
      }

      try {
        const rawSlots = localStorage.getItem(SLOT_STORAGE_KEY);
        if (rawSlots) {
          const parsedSlots = JSON.parse(rawSlots);
          slots = sanitizeSlots(parsedSlots);
        }
      } catch (error) {
        slots = [];
      }

      return { ...ui, slots };
    }

    function saveUiState() {
      localStorage.setItem(UI_STORAGE_KEY, JSON.stringify({
        selectedTrainerId: state.selectedTrainerId,
        selectedPresetId: state.selectedPresetId,
        view: state.view,
        cursorDate: state.cursorDate
      }));
    }

    function saveSlotsLocal() {
      localStorage.setItem(SLOT_STORAGE_KEY, JSON.stringify(state.slots));
    }

    function sanitizeSlots(rawSlots) {
      if (!Array.isArray(rawSlots)) return [];
      return rawSlots
        .filter((slot) => slot && typeof slot === "object" && slot.date && slot.trainerId)
        .map((slot) => {
          const preset = getPresetById(slot.presetId);
          const startMin = clamp(snapMinutes(Number(slot.startMin) || 0), 0, TOTAL_MINUTES - SNAP);
          const durationMin = clamp(snapMinutes(Number(slot.durationMin) || preset.defaultDuration || 60), SNAP, TOTAL_MINUTES - startMin);
          const participants = Array.isArray(slot.participants)
            ? slot.participants.map(normalizeParticipant).filter(Boolean)
            : [];
          return {
            id: typeof slot.id === "string" ? slot.id : uid(),
            trainerId: TRAINERS.some((trainer) => trainer.id === slot.trainerId) ? slot.trainerId : TRAINERS[0].id,
            date: typeof slot.date === "string" ? slot.date : toISO(new Date()),
            startMin,
            durationMin,
            presetId: preset.id,
            title: typeof slot.title === "string" && slot.title.trim() ? slot.title.trim() : preset.title,
            comment: typeof slot.comment === "string" ? slot.comment : "",
            participants: preset.participants ? participants : []
          };
        })
        .sort((a, b) => `${a.date}${String(a.startMin).padStart(4, "0")}${a.id}`.localeCompare(`${b.date}${String(b.startMin).padStart(4, "0")}${b.id}`));
    }

    function updateSyncBadge(mode, textValue) {
      syncStatus.textContent = textValue;
      syncStatus.className = `meta-pill ${mode}`;
      boardBadge.textContent = `Доска: ${getBoardId()}`;
    }

    async function initRemoteSync() {
      updateSyncBadge("offline", "Локально");
      if (!window.FRD_FIREBASE_CONFIG || !window.firebase || !firebase.apps) return;
      try {
        const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(window.FRD_FIREBASE_CONFIG);
        remoteDb = firebase.firestore(app);
        remoteBoardRef = remoteDb.collection("frdBoards").doc(getBoardId());
        remoteSlotsRef = remoteBoardRef.collection("slots");
        syncEnabled = true;
        updateSyncBadge("offline", "Подключение...");

        remoteUnsubscribe = remoteSlotsRef.onSnapshot(async (snapshot) => {
          const remoteSlots = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
          remoteKnownSlotIds = new Set(snapshot.docs.map((doc) => doc.id));
          remoteReady = true;

          if (snapshot.empty && state.slots.length) {
            await persistSlots();
            updateSyncBadge("online", "Онлайн");
            renderAll();
            return;
          }

          state.slots = sanitizeSlots(remoteSlots);
          saveSlotsLocal();
          updateSyncBadge("online", "Онлайн");
          renderAll();
        }, (error) => {
          console.error(error);
          updateSyncBadge("error", "Ошибка sync");
        });
      } catch (error) {
        console.error(error);
        syncEnabled = false;
        remoteReady = false;
        updateSyncBadge("error", "Ошибка sync");
      }
    }

    async function persistSlots() {
      saveSlotsLocal();
      if (!syncEnabled || !remoteBoardRef || !remoteSlotsRef || !remoteReady) return;
      try {
        const batch = remoteDb.batch();
        const currentIds = new Set();

        batch.set(remoteBoardRef, {
          boardId: getBoardId(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          version: 3
        }, { merge: true });

        state.slots.forEach((slot) => {
          currentIds.add(slot.id);
          const { id, ...payload } = slot;
          batch.set(remoteSlotsRef.doc(id), {
            ...payload,
            participants: Array.isArray(slot.participants) ? slot.participants : [],
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
        });

        remoteKnownSlotIds.forEach((slotId) => {
          if (!currentIds.has(slotId)) {
            batch.delete(remoteSlotsRef.doc(slotId));
          }
        });

        await batch.commit();
        remoteKnownSlotIds = currentIds;
        updateSyncBadge("online", "Онлайн");
      } catch (error) {
        console.error(error);
        updateSyncBadge("error", "Ошибка sync");
      }
    }

    function getFilteredSlots() {
      return state.slots.filter((slot) => slot.trainerId === state.selectedTrainerId);
    }

    function getSlotsForTrainer(trainerId) {
      return state.slots.filter((slot) => slot.trainerId === trainerId);
    }

    function getVisibleDates() {
      const cursor = parseISO(state.cursorDate) || new Date();
      if (state.view === "day") return [cursor];
      if (state.view === "week") {
        const monday = startOfWeek(cursor);
        return Array.from({ length: 5 }, (_, index) => addDays(monday, index));
      }
      return [];
    }

    function getPeriodBounds() {
      const cursor = parseISO(state.cursorDate) || new Date();
      if (state.view === "day") {
        return { start: toISO(cursor), end: toISO(cursor) };
      }
      if (state.view === "week") {
        const monday = startOfWeek(cursor);
        const friday = addDays(monday, 4);
        return { start: toISO(monday), end: toISO(friday) };
      }
      const first = new Date(cursor.getFullYear(), cursor.getMonth(), 1, 12);
      const last = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0, 12);
      return { start: toISO(first), end: toISO(last) };
    }

    function slotInPeriod(slot) {
      const bounds = getPeriodBounds();
      return slot.date >= bounds.start && slot.date <= bounds.end;
    }

    function getTrainerMinutesForPeriod(trainerId) {
      return state.slots
        .filter((slot) => slot.trainerId === trainerId && slotInPeriod(slot))
        .reduce((sum, slot) => sum + slot.durationMin, 0);
    }

    function renderTrainerTabs() {
      trainerTabs.innerHTML = TRAINERS.map((trainer) => {
        const minutes = getTrainerMinutesForPeriod(trainer.id);
        return `
          <button class="tab-btn ${trainer.id === state.selectedTrainerId ? "active" : ""}" data-trainer-id="${trainer.id}" type="button">
            <span>${trainer.name}</span>
            <small>${minutes ? formatDuration(minutes) : "0 м"}</small>
          </button>
        `;
      }).join("");
    }

    function renderViewTabs() {
      const views = [
        { id: "day", title: "День" },
        { id: "week", title: "Неделя" },
        { id: "month", title: "Месяц" }
      ];
      viewTabs.innerHTML = views.map((view) => `
        <button class="tab-btn ${view.id === state.view ? "active" : ""}" data-view-id="${view.id}" type="button">${view.title}</button>
      `).join("");
    }

    function renderPresets() {
      presetList.innerHTML = PRESETS.map((preset) => `
        <button class="preset-btn ${preset.id === state.selectedPresetId ? "active" : ""}" data-preset-id="${preset.id}" type="button">
          <span class="summary-left">
            <span class="swatch" style="background:${preset.color}"></span>
            <span>${preset.title}</span>
          </span>
        </button>
      `).join("");
      modalPreset.innerHTML = PRESETS.map((preset) => `<option value="${preset.id}">${preset.title}</option>`).join("");
    }

    function renderSummary() {
      const periodSlots = state.slots.filter((slot) => slotInPeriod(slot) && slot.trainerId === state.selectedTrainerId);
      const totals = PRESETS.map((preset) => {
        const minutes = periodSlots
          .filter((slot) => slot.presetId === preset.id)
          .reduce((sum, slot) => sum + slot.durationMin, 0);
        return { ...preset, minutes };
      });

      const overall = totals.reduce((sum, item) => sum + item.minutes, 0);
      const allTrainerTotal = state.slots
        .filter(slotInPeriod)
        .reduce((sum, slot) => sum + slot.durationMin, 0);

      const items = totals
        .filter((item) => item.minutes > 0)
        .map((item) => `
          <div class="summary-item">
            <div class="summary-left">
              <span class="swatch" style="background:${item.color}"></span>
              <span>${item.title}</span>
            </div>
            <strong>${formatDuration(item.minutes)}</strong>
          </div>
        `)
        .join("");

      summaryEl.innerHTML = `
        ${items || '<div class="empty-note">У выбранного тренера пока пусто</div>'}
        <div class="summary-total">
          <span>Выбранный тренер</span>
          <span>${formatDuration(overall)}</span>
        </div>
        <div class="summary-total">
          <span>Все тренеры</span>
          <span>${formatDuration(allTrainerTotal)}</span>
        </div>
      `;
    }

    function renderBoardHeader() {
      const trainer = getTrainerById(state.selectedTrainerId);
      const cursor = parseISO(state.cursorDate) || new Date();
      boardTitle.textContent = trainer.name;
      if (state.view === "day") {
        boardSubtitle.textContent = formatDateLabel(cursor);
      } else if (state.view === "week") {
        const monday = startOfWeek(cursor);
        const friday = addDays(monday, 4);
        boardSubtitle.textContent = `${String(monday.getDate()).padStart(2, "0")}.${String(monday.getMonth() + 1).padStart(2, "0")} — ${String(friday.getDate()).padStart(2, "0")}.${String(friday.getMonth() + 1).padStart(2, "0")}`;
      } else {
        boardSubtitle.textContent = `${MONTH_LABELS[cursor.getMonth()]} ${cursor.getFullYear()}`;
      }
      dateInput.value = state.cursorDate;
    }

    function renderTimeAxis() {
      const labels = [];
      for (let i = 0; i <= END_HOUR - START_HOUR; i += 1) {
        const top = i * HOUR_HEIGHT;
        labels.push(`<div class="time-label" style="top:${top}px">${String(START_HOUR + i).padStart(2, "0")}:00</div>`);
      }
      return `<div class="time-axis">${labels.join("")}</div>`;
    }

    function buildDayLayouts(slots) {
      const normalized = slots
        .map((slot) => ({ slot, startMin: slot.startMin, endMin: slot.startMin + slot.durationMin }))
        .sort((a, b) => a.startMin - b.startMin || a.endMin - b.endMin || a.slot.id.localeCompare(b.slot.id));
      const layouts = new Map();
      let group = [];
      let groupEnd = -Infinity;

      function flushGroup() {
        if (!group.length) return;
        const columnEnds = [];
        const assigned = [];
        let maxColumns = 1;

        group.forEach((item) => {
          let columnIndex = columnEnds.findIndex((end) => end <= item.startMin);
          if (columnIndex === -1) {
            columnIndex = columnEnds.length;
            columnEnds.push(item.endMin);
          } else {
            columnEnds[columnIndex] = item.endMin;
          }
          maxColumns = Math.max(maxColumns, columnEnds.length);
          assigned.push({ item, columnIndex });
        });

        assigned.forEach(({ item, columnIndex }) => {
          layouts.set(item.slot.id, {
            columnIndex,
            columns: maxColumns,
            startMin: item.startMin,
            endMin: item.endMin
          });
        });

        group = [];
        groupEnd = -Infinity;
      }

      normalized.forEach((item) => {
        if (!group.length || item.startMin < groupEnd) {
          group.push(item);
          groupEnd = Math.max(groupEnd, item.endMin);
        } else {
          flushGroup();
          group.push(item);
          groupEnd = item.endMin;
        }
      });

      flushGroup();
      return layouts;
    }


    function renderSlot(slot, layout) {
      const preset = getPresetById(slot.presetId);
      const trainer = getTrainerById(slot.trainerId);
      const top = slot.startMin * PX_PER_MINUTE;
      const height = slot.durationMin * PX_PER_MINUTE;
      const columns = Math.max(layout?.columns || 1, 1);
      const columnIndex = Math.max(layout?.columnIndex || 0, 0);
      const gap = columns > 1 ? 6 : 0;
      const widthStyle = columns > 1
        ? `left:calc(8px + (((100% - 16px - ${(columns - 1) * gap}px) / ${columns}) * ${columnIndex}) + ${columnIndex * gap}px); width:calc((100% - 16px - ${(columns - 1) * gap}px) / ${columns});`
        : "left:8px; width:calc(100% - 16px);";
      const activeClass = interaction && interaction.slotId === slot.id ? (interaction.mode === "drag" ? "dragging" : "resizing") : "";
      const compact = height < 70 ? "compact" : "";
      const noteText = slot.comment && height >= 106 ? `<span class="slot-note">${escapeHtml(slot.comment)}</span>` : "";
      return `
        <div class="slot ${activeClass} ${compact}" data-id="${slot.id}" style="top:${top}px; height:${height}px; ${widthStyle} background:${preset.color};" title="${escapeHtml(trainer.name)} · ${escapeHtml(slot.title)}">
          <button class="delete-btn" type="button" aria-label="Удалить">×</button>
          <div class="slot-title" data-title-id="${slot.id}">${escapeHtml(slot.title)}</div>
          <div class="slot-meta">${formatTime(slot.startMin)}–${formatTime(slot.startMin + slot.durationMin)}</div>
          ${noteText}
          <div class="resize-handle"></div>
        </div>
      `;
    }

    function renderWeekOrDay() {
      const dates = getVisibleDates();
      const isDay = state.view === "day";
      document.documentElement.style.setProperty("--cols", String(dates.length));
      const headerClass = isDay ? "day-header-row" : "week-header";
      const daysClass = isDay ? "days-grid day" : "days-grid week";

      const headers = dates.map((date) => {
        const weekend = isWeekend(date);
        return `<div class="day-header">${isDay ? formatDateLabel(date) : WEEKDAY_LONG[getWeekdayIndex(date)]}<small>${weekend ? "выходной" : String(date.getDate()).padStart(2, "0") + "." + String(date.getMonth() + 1).padStart(2, "0")}</small></div>`;
      }).join("");

      const columns = dates.map((date) => {
        const iso = toISO(date);
        const weekend = isWeekend(date);
        const daySlots = getFilteredSlots().filter((slot) => slot.date === iso).sort((a, b) => a.startMin - b.startMin || a.durationMin - b.durationMin);
        const layouts = buildDayLayouts(daySlots);
        return `
          <div class="day-column ${weekend ? "weekend" : ""}" data-date="${iso}" aria-label="${formatDateLabel(date)}">
            ${weekend ? '<div class="weekend-center">Выходной</div>' : daySlots.map((slot) => renderSlot(slot, layouts.get(slot.id))).join("")}
          </div>
        `;
      }).join("");

      boardContent.innerHTML = `
        <div class="${headerClass}">
          <div class="time-head">Время</div>
          ${headers}
        </div>
        <div class="grid-wrap">
          ${renderTimeAxis()}
          <div class="${daysClass}" id="daysGrid">${columns}</div>
        </div>
      `;
    }

    function renderMonth() {
      const cursor = parseISO(state.cursorDate) || new Date();
      const start = startOfMonthGrid(cursor);
      const days = Array.from({ length: 42 }, (_, index) => addDays(start, index));
      const trainerSlots = getFilteredSlots();
      boardContent.innerHTML = `
        <div class="month-grid">
          ${WEEKDAY_LABELS.map((label) => `<div class="month-weekday">${label}</div>`).join("")}
          ${days.map((date) => {
            const iso = toISO(date);
            const isCurrentMonth = date.getMonth() === cursor.getMonth();
            const weekend = isWeekend(date);
            const daySlots = trainerSlots.filter((slot) => slot.date === iso).sort((a, b) => a.startMin - b.startMin);
            const total = daySlots.reduce((sum, slot) => sum + slot.durationMin, 0);
            return `
              <div class="month-cell ${isCurrentMonth ? "" : "outside"} ${weekend ? "weekend" : ""} ${iso === state.cursorDate ? "active" : ""}" data-month-date="${iso}">
                <div class="month-top">
                  <span>${date.getDate()}</span>
                  <span class="month-total">${total ? formatDuration(total) : ""}</span>
                </div>
                <div class="chip-list">
                  ${daySlots.slice(0, 5).map((slot) => {
                    const preset = getPresetById(slot.presetId);
                    return `<div class="chip" style="background:${preset.color}">${formatTime(slot.startMin)} ${escapeHtml(slot.title)}</div>`;
                  }).join("")}
                  ${daySlots.length > 5 ? `<div class="month-total">ещё ${daySlots.length - 5}</div>` : ""}
                  ${!daySlots.length && weekend ? '<div class="month-total">выходной</div>' : ""}
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderBoard() {
      renderBoardHeader();
      if (state.view === "month") renderMonth();
      else renderWeekOrDay();
    }

    function renderAll() {
      renderTrainerTabs();
      renderViewTabs();
      renderPresets();
      renderSummary();
      renderBoard();
      syncModalTypeUi();
    }

    function getSlotById(id) {
      return state.slots.find((slot) => slot.id === id);
    }
    function rangesOverlap(startA, durationA, startB, durationB) {
      const endA = startA + durationA;
      const endB = startB + durationB;
      return startA < endB && startB < endA;
    }

    function findSlotConflicts(candidate, excludeSlotId = null) {
      return state.slots.filter((slot) => {
        if (slot.id === excludeSlotId) return false;
        if (slot.trainerId !== candidate.trainerId) return false;
        if (slot.date !== candidate.date) return false;
        return rangesOverlap(slot.startMin, slot.durationMin, candidate.startMin, candidate.durationMin);
      });
    }

    function validateSlotConflicts(candidate, excludeSlotId = null) {
      const conflicts = findSlotConflicts(candidate, excludeSlotId);
      if (!conflicts.length) return true;
      const firstConflict = conflicts[0];
      alert(`У ${getTrainerById(candidate.trainerId).name} уже есть запись «${firstConflict.title}» на ${formatTime(firstConflict.startMin)}–${formatTime(firstConflict.startMin + firstConflict.durationMin)}. Пересечения запрещены.`);
      return false;
    }


    function removeSlot(id) {
      state.slots = state.slots.filter((slot) => slot.id !== id);
      if (participantsViewerState.slotId === id) closeParticipantsViewer();
      persistSlots();
      renderAll();
    }

    function getVisibleColumnElements() {
      return Array.from(document.querySelectorAll(".day-column[data-date]"));
    }

    function getNearestVisibleDate(clientX) {
      const columns = getVisibleColumnElements().filter((col) => !col.classList.contains("weekend"));
      if (!columns.length) return null;
      let nearest = columns[0];
      let bestDistance = Infinity;
      columns.forEach((column) => {
        const rect = column.getBoundingClientRect();
        const center = rect.left + rect.width / 2;
        const distance = Math.abs(clientX - center);
        if (distance < bestDistance) {
          bestDistance = distance;
          nearest = column;
        }
      });
      return nearest.dataset.date;
    }

    function updateCursorByStep(step) {
      closeParticipantsViewer();
      const cursor = parseISO(state.cursorDate) || new Date();
      let next;
      if (state.view === "day") next = addDays(cursor, step);
      else if (state.view === "week") next = addDays(cursor, step * 7);
      else next = addMonths(cursor, step);
      state.cursorDate = toISO(next);
      saveUiState();
      renderAll();
    }

    function openModal(payload) {
      closeParticipantsViewer();
      modalState.open = true;
      modalState.mode = payload.mode;
      modalState.slotId = payload.slotId || null;
      modalState.participants = Array.isArray(payload.participants) ? payload.participants.map(normalizeParticipant).filter(Boolean) : [];
      modalHeading.textContent = payload.mode === "edit" ? "Редактирование карточки" : "Новая карточка";
      modalPreset.value = payload.presetId;
      modalTitle.value = payload.title || getPresetById(payload.presetId).title;
      modalDate.value = payload.date;
      modalStart.value = formatTime(payload.startMin);
      modalDuration.value = payload.durationMin;
      modalComment.value = payload.comment || "";
      modalDeleteBtn.disabled = payload.mode !== "edit";
      editorModal.classList.add("open");
      editorModal.setAttribute("aria-hidden", "false");
      syncModalTypeUi();
      renderParticipantTags();
      setTimeout(() => modalTitle.focus(), 0);
    }

    function closeModal() {
      modalState.open = false;
      modalState.mode = "new";
      modalState.slotId = null;
      modalState.participants = [];
      editorModal.classList.remove("open");
      editorModal.setAttribute("aria-hidden", "true");
      participantInput.value = "";
    }

    function syncModalTypeUi() {
      const preset = getPresetById(modalPreset.value);
      participantsSection.classList.toggle("participants-section-hidden", !preset.participants);
      renderParticipantTags();
    }

    function renderParticipantTags() {
      if (!modalState.participants.length) {
        participantTags.innerHTML = '<span class="tag-empty">Участники не добавлены</span>';
        return;
      }
      participantTags.innerHTML = modalState.participants.map((participant, index) => {
        const name = typeof participant === "string" ? participant : participant.name;
        return `
          <span class="tag-chip">
            <span>${escapeHtml(name)}</span>
            <button class="tag-remove" type="button" data-remove-index="${index}" aria-label="Удалить участника">×</button>
          </span>
        `;
      }).join("");
    }

    function addParticipantFromInput() {
      const value = participantInput.value.trim();
      if (!value) return;
      modalState.participants.push({ name: value, attended: null });
      participantInput.value = "";
      renderParticipantTags();
      participantInput.focus();
    }

    function collectModalData() {
      const preset = getPresetById(modalPreset.value);
      const date = modalDate.value;
      const title = modalTitle.value.trim() || preset.title;
      const startAbsMin = parseTime(modalStart.value || "09:00");
      const durationMin = snapMinutes(Number(modalDuration.value || preset.defaultDuration));
      const startMin = startAbsMin - START_HOUR * 60;
      const endMin = startMin + durationMin;
      const dateObj = parseISO(date);
      if (!dateObj || isWeekend(dateObj)) {
        alert("Суббота и воскресенье недоступны.");
        return null;
      }
      if (startMin < 0 || endMin > TOTAL_MINUTES || durationMin <= 0) {
        alert("Рабочее время только с 09:00 до 18:00.");
        return null;
      }
      return {
        trainerId: state.selectedTrainerId,
        date,
        startMin,
        durationMin,
        presetId: preset.id,
        title,
        comment: modalComment.value.trim(),
        participants: preset.participants ? modalState.participants.map(normalizeParticipant).filter(Boolean) : []
      };
    }

    function saveFromModal() {
      const payload = collectModalData();
      if (!payload) return;
      if (!validateSlotConflicts(payload, modalState.mode === "edit" ? modalState.slotId : null)) return;
      let savedSlotId = modalState.slotId;
      if (modalState.mode === "edit" && modalState.slotId) {
        state.slots = state.slots.map((slot) => slot.id === modalState.slotId ? { ...slot, ...payload } : slot);
      } else {
        savedSlotId = uid();
        state.slots.push({ id: savedSlotId, ...payload });
      }
      state.slots = sanitizeSlots(state.slots);
      state.cursorDate = payload.date;
      saveUiState();
      closeModal();
      persistSlots();
      renderAll();
      requestAnimationFrame(() => {
        const savedEl = document.querySelector(`.slot[data-id="${savedSlotId}"]`);
        if (savedEl) {
          savedEl.scrollIntoView({ block: "nearest", inline: "nearest" });
          savedEl.animate([
            { transform: "scale(0.98)", boxShadow: "0 12px 18px rgba(15, 23, 42, 0.18)" },
            { transform: "scale(1.02)", boxShadow: "0 16px 24px rgba(15, 23, 42, 0.24)" },
            { transform: "scale(1)", boxShadow: "0 12px 18px rgba(15, 23, 42, 0.18)" }
          ], { duration: 450, easing: "ease-out" });
        }
      });
    }

    function openModalForSlot(slotId) {
      const slot = getSlotById(slotId);
      if (!slot) return;
      openModal({
        mode: "edit",
        slotId: slot.id,
        presetId: slot.presetId,
        title: slot.title,
        date: slot.date,
        startMin: slot.startMin,
        durationMin: slot.durationMin,
        participants: slot.participants,
        comment: slot.comment
      });
    }

    function openModalForNew(dateIso, startMin) {
      const preset = getPresetById(state.selectedPresetId);
      openModal({
        mode: "new",
        slotId: null,
        presetId: preset.id,
        title: preset.title,
        date: dateIso,
        startMin,
        durationMin: Math.min(preset.defaultDuration, TOTAL_MINUTES - startMin),
        participants: [],
        comment: ""
      });
    }

    function startInlineTitleEdit(slotId, titleEl) {
      const slot = getSlotById(slotId);
      if (!slot || titleEl.querySelector("input")) return;
      const original = slot.title;
      const input = document.createElement("input");
      input.className = "slot-title-input";
      input.value = original;
      titleEl.innerHTML = "";
      titleEl.appendChild(input);
      input.focus();
      input.select();

      const finish = (save) => {
        if (!document.body.contains(input)) return;
        const nextTitle = input.value.trim() || getPresetById(slot.presetId).title;
        if (save && nextTitle !== slot.title) {
          state.slots = state.slots.map((item) => item.id === slotId ? { ...item, title: nextTitle } : item);
          persistSlots();
          renderAll();
        } else {
          renderAll();
        }
      };

      input.addEventListener("mousedown", (event) => event.stopPropagation());
      input.addEventListener("click", (event) => event.stopPropagation());
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          finish(true);
        }
        if (event.key === "Escape") {
          event.preventDefault();
          finish(false);
        }
      });
      input.addEventListener("blur", () => finish(true), { once: true });
    }

    trainerTabs.addEventListener("click", (event) => {
      const button = event.target.closest(".tab-btn[data-trainer-id]");
      if (!button) return;
      state.selectedTrainerId = button.dataset.trainerId;
      closeParticipantsViewer();
      saveUiState();
      renderAll();
    });

    viewTabs.addEventListener("click", (event) => {
      const button = event.target.closest(".tab-btn[data-view-id]");
      if (!button) return;
      state.view = button.dataset.viewId;
      closeParticipantsViewer();
      saveUiState();
      renderAll();
    });

    presetList.addEventListener("click", (event) => {
      const button = event.target.closest(".preset-btn[data-preset-id]");
      if (!button) return;
      state.selectedPresetId = button.dataset.presetId;
      saveUiState();
      renderAll();
    });

    prevBtn.addEventListener("click", () => updateCursorByStep(-1));
    nextBtn.addEventListener("click", () => updateCursorByStep(1));
    todayBtn.addEventListener("click", () => {
      state.cursorDate = toISO(new Date());
      closeParticipantsViewer();
      saveUiState();
      renderAll();
    });

    dateInput.addEventListener("change", () => {
      if (!dateInput.value) return;
      state.cursorDate = dateInput.value;
      closeParticipantsViewer();
      saveUiState();
      renderAll();
    });

    modalPreset.addEventListener("change", () => {
      const preset = getPresetById(modalPreset.value);
      if (!modalTitle.value.trim() || PRESETS.some((item) => item.title === modalTitle.value.trim())) {
        modalTitle.value = preset.title;
      }
      const currentDuration = Number(modalDuration.value || 0);
      if (!currentDuration || PRESETS.some((item) => item.defaultDuration === currentDuration)) {
        modalDuration.value = preset.defaultDuration;
      }
      syncModalTypeUi();
    });

    participantAddBtn.addEventListener("click", addParticipantFromInput);
    participantInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        addParticipantFromInput();
      }
    });

    participantTags.addEventListener("click", (event) => {
      const btn = event.target.closest("[data-remove-index]");
      if (!btn) return;
      modalState.participants.splice(Number(btn.dataset.removeIndex), 1);
      renderParticipantTags();
    });

    modalCloseBtn.addEventListener("click", closeModal);
    modalSaveBtn.addEventListener("click", saveFromModal);
    modalDeleteBtn.addEventListener("click", () => {
      if (!modalState.slotId) return;
      removeSlot(modalState.slotId);
      closeModal();
    });
    participantsViewerList.addEventListener("click", (event) => {
      const attendBtn = event.target.closest("[data-attend]");
      if (!attendBtn) return;
      const slotId = attendBtn.dataset.slotId;
      const index = Number(attendBtn.dataset.index);
      const nextValue = attendBtn.dataset.attend === "yes" ? true : false;
      state.slots = state.slots.map((slot) => {
        if (slot.id !== slotId) return slot;
        const participants = (slot.participants || []).map((participant, i) => i === index ? { ...participant, attended: participant.attended === nextValue ? null : nextValue } : participant);
        return { ...slot, participants };
      });
      persistSlots();
      const nextSlot = getSlotById(slotId);
      if (nextSlot) {
        renderParticipantsViewer(nextSlot);
        renderBoard();
      }
    });

    editorModal.addEventListener("click", (event) => {
      if (event.target === editorModal) closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modalState.open) closeModal();
    });

    participantsViewerCloseBtn.addEventListener("click", closeParticipantsViewer);
    participantsViewerModal.addEventListener("click", (event) => {
      if (event.target === participantsViewerModal) closeParticipantsViewer();
    });



    boardContent.addEventListener("click", (event) => {
      const deleteBtn = event.target.closest(".delete-btn");
      if (deleteBtn) {
        const slotEl = deleteBtn.closest(".slot");
        if (slotEl) removeSlot(slotEl.dataset.id);
        return;
      }

      if (state.view === "month") {
        const monthCell = event.target.closest(".month-cell[data-month-date]");
        if (!monthCell) return;
        const monthDate = parseISO(monthCell.dataset.monthDate);
        if (monthDate && isWeekend(monthDate)) return;
        closeParticipantsViewer();
        state.cursorDate = monthCell.dataset.monthDate;
        state.view = "day";
        saveUiState();
        renderAll();
        return;
      }

      const slotEl = event.target.closest(".slot");
      if (slotEl) {
        if (event.target.closest(".resize-handle")) return;
        openModalForSlot(slotEl.dataset.id);
        return;
      }

      const column = event.target.closest(".day-column[data-date]");
      if (!column || column.classList.contains("weekend")) return;
      const rect = column.getBoundingClientRect();
      const y = clamp(event.clientY - rect.top, 0, rect.height);
      const startMin = clamp(snapMinutes(y / PX_PER_MINUTE), 0, TOTAL_MINUTES - SNAP);
      openModalForNew(column.dataset.date, startMin);
    });



    document.addEventListener("mousedown", (event) => {
      if (state.view === "month" || modalState.open) return;
      if (
        event.target.closest(".delete-btn") ||
        event.target.closest(".slot-title-input") ||
        event.target.closest("#participantsViewerModal") ||
        event.target.closest(".attend-btn")
      ) return;
      const resizeHandle = event.target.closest(".resize-handle");
      if (!resizeHandle) return;
      const slotEl = resizeHandle.closest(".slot");
      if (!slotEl) return;
      const slot = getSlotById(slotEl.dataset.id);
      if (!slot) return;
      interaction = {
        slotId: slot.id,
        mode: "resize",
        startX: event.clientX,
        startY: event.clientY,
        originalDate: slot.date,
        originalStart: slot.startMin,
        originalDuration: slot.durationMin
      };
      document.body.style.cursor = "ns-resize";
      event.preventDefault();
      renderBoard();
    });

    document.addEventListener("mousemove", (event) => {
      if (!interaction || state.view === "month" || modalState.open) return;
      const slot = getSlotById(interaction.slotId);
      if (!slot) return;
      const deltaY = event.clientY - interaction.startY;
      const deltaMinutes = snapMinutes(deltaY / PX_PER_MINUTE);

      if (interaction.mode === "drag") {
        const nextDate = getNearestVisibleDate(event.clientX) || interaction.originalDate;
        const nextStart = clamp(interaction.originalStart + deltaMinutes, 0, TOTAL_MINUTES - interaction.originalDuration);
        state.slots = state.slots.map((item) => item.id === interaction.slotId ? { ...item, date: nextDate, startMin: nextStart } : item);
      } else {
        const nextDuration = clamp(interaction.originalDuration + deltaMinutes, SNAP, TOTAL_MINUTES - interaction.originalStart);
        state.slots = state.slots.map((item) => item.id === interaction.slotId ? { ...item, durationMin: nextDuration } : item);
      }

      renderBoard();
      renderSummary();
    });

    document.addEventListener("mouseup", () => {
      if (!interaction) return;
      const currentInteraction = interaction;
      const slot = getSlotById(currentInteraction.slotId);
      interaction = null;
      document.body.style.cursor = "default";

      if (slot && !validateSlotConflicts(slot, slot.id)) {
        state.slots = state.slots.map((item) => item.id === currentInteraction.slotId ? {
          ...item,
          date: currentInteraction.originalDate,
          startMin: currentInteraction.originalStart,
          durationMin: currentInteraction.originalDuration
        } : item);
      }

      persistSlots();
      renderAll();
    });

    renderAll();
    initRemoteSync();
  </script>
</body>
</html>
