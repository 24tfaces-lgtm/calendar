<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ФРД — календарь рабочего дня</title>
  <style>
    :root {
      --bg: #eff4fb;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --line: #dbe6f1;
      --line-strong: #c5d4e3;
      --text: #0f172a;
      --muted: #64748b;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --time-col: 84px;
      --hours: 9;
      --hour-height: 72px;
      --gap: 12px;
      --accent: #2563eb;
      --danger: #b91c1c;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.08), transparent 24%),
        linear-gradient(180deg, #eef4fb 0%, #f8fbff 100%);
      color: var(--text);
    }

    button, select, input { font: inherit; }

    .app {
      min-height: 100vh;
      padding: 20px;
      display: grid;
      gap: 18px;
    }

    .topbar,
    .summary-strip,
    .board {
      background: var(--panel);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .topbar-row {
      display: grid;
      gap: 12px;
      align-items: end;
    }

    .topbar-row.primary {
      grid-template-columns: minmax(160px, 220px) minmax(280px, 1.15fr) minmax(240px, 0.85fr) minmax(320px, 1fr);
    }

    .topbar-row.secondary {
      grid-template-columns: minmax(520px, 1fr) minmax(300px, 420px);
      align-items: start;
    }

    .brand-block {
      padding: 14px 16px;
      border-radius: 20px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .brand-kicker {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .brand-block h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1;
    }

    .brand-note {
      font-size: 13px;
      font-weight: 500;
      opacity: 0.8;
    }

    .control-group {
      border: 1px solid #e5edf5;
      border-radius: 20px;
      padding: 12px;
      background: var(--panel-soft);
      min-height: 100%;
    }

    .group-title {
      display: block;
      margin-bottom: 10px;
      padding-left: 2px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .trainer-tabs,
    .view-tabs,
    .nav-controls {
      display: grid;
      gap: 8px;
    }

    .trainer-tabs { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .view-tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .nav-controls { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .nav-stack {
      display: grid;
      gap: 8px;
    }

    .preset-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .secondary-actions {
      display: grid;
      grid-template-columns: minmax(140px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .field-wrap {
      display: grid;
      gap: 8px;
    }

    .field-label {
      display: block;
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .tab-btn,
    .preset-btn,
    .action-btn,
    .nav-btn,
    select,
    input[type="date"] {
      width: 100%;
      border: 1px solid #d7e4ef;
      background: #fff;
      border-radius: var(--radius-md);
      padding: 12px 14px;
      transition: 0.18s ease;
      min-height: 46px;
    }

    .tab-btn,
    .preset-btn,
    .action-btn,
    .nav-btn {
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
    }

    .tab-btn:hover,
    .preset-btn:hover,
    .action-btn:hover,
    .nav-btn:hover,
    select:hover,
    input[type="date"]:hover {
      transform: translateY(-1px);
      border-color: #b8cbe0;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
    }

    .tab-btn.active,
    .preset-btn.active {
      border-color: transparent;
      background: #f8fbff;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.16);
    }

    .tab-btn small {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
    }

    .tab-btn.active small {
      color: var(--text);
    }

    .preset-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
    }

    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.45);
    }

    .summary-strip {
      padding: 14px 16px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .summary-item,
    .summary-total,
    .empty-note {
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid #e7eef6;
      background: #fff;
      font-size: 14px;
    }

    .summary-item,
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .summary-total {
      font-weight: 800;
      background: #f8fbff;
    }

    .summary-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .action-btn.warn {
      color: var(--danger);
      background: #fff5f5;
      border-color: #fecaca;
      white-space: nowrap;
    }

    .board {
      padding: 18px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .board-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .board-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .board-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .week-header,
    .day-header-row {
      display: grid;
      gap: var(--gap);
      min-width: 980px;
    }

    .week-header {
      grid-template-columns: var(--time-col) repeat(var(--cols), minmax(180px, 1fr));
    }

    .day-header-row {
      grid-template-columns: var(--time-col) minmax(260px, 1fr);
      min-width: 440px;
    }

    .day-header,
    .time-head,
    .month-weekday {
      border-radius: 16px;
      background: #f7faff;
      border: 1px solid #e3edf6;
      padding: 14px 16px;
      font-weight: 700;
    }

    .time-head {
      color: var(--muted);
      font-weight: 700;
      text-align: center;
    }

    .day-header small {
      display: block;
      margin-top: 4px;
      font-weight: 600;
      color: var(--muted);
    }

    .grid-wrap {
      display: grid;
      grid-template-columns: var(--time-col) 1fr;
      gap: var(--gap);
    }

    .time-axis {
      position: relative;
      height: calc(var(--hours) * var(--hour-height));
      border-radius: 18px;
      background: linear-gradient(180deg, #fafcff 0%, #f4f8fc 100%);
      border: 1px solid #e3edf6;
    }

    .time-label {
      position: absolute;
      left: 0;
      width: 100%;
      transform: translateY(-50%);
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .days-grid {
      display: grid;
      gap: var(--gap);
      min-width: 980px;
    }

    .days-grid.week {
      grid-template-columns: repeat(var(--cols), minmax(180px, 1fr));
    }

    .days-grid.day {
      grid-template-columns: minmax(260px, 1fr);
      min-width: 360px;
    }

    .day-column {
      position: relative;
      height: calc(var(--hours) * var(--hour-height));
      border-radius: 18px;
      border: 1px solid #dfe9f3;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(148, 163, 184, 0.18) 0,
          rgba(148, 163, 184, 0.18) 1px,
          transparent 1px,
          transparent calc(var(--hour-height) / 4)
        ),
        repeating-linear-gradient(
          to bottom,
          rgba(100, 116, 139, 0.24) 0,
          rgba(100, 116, 139, 0.24) 1.5px,
          transparent 1.5px,
          transparent var(--hour-height)
        ),
        linear-gradient(180deg, #fcfdff 0%, #f9fbfd 100%);
      overflow: visible;
      cursor: crosshair;
    }

    .day-column.weekend {
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      cursor: default;
    }

    .weekend-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #64748b;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      padding: 16px;
    }

    .slot {
      position: absolute;
      left: 8px;
      right: 8px;
      border-radius: 16px;
      padding: 10px 12px 18px;
      color: #fff;
      box-shadow: 0 12px 18px rgba(15, 23, 42, 0.18);
      cursor: grab;
      user-select: none;
      overflow: hidden;
    }

    .slot.dragging,
    .slot.resizing {
      outline: 2px solid rgba(255, 255, 255, 0.65);
      outline-offset: -2px;
      filter: saturate(1.08);
    }

    .slot:active { cursor: grabbing; }

    .slot-title {
      padding-right: 20px;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .slot-meta {
      font-size: 12px;
      opacity: 0.95;
      font-weight: 700;
    }

    .delete-btn {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: none;
      background: rgba(255, 255, 255, 0.22);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      display: grid;
      place-items: center;
      line-height: 1;
    }

    .resize-handle {
      position: absolute;
      left: 50%;
      bottom: 5px;
      transform: translateX(-50%);
      width: 46px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      cursor: ns-resize;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: var(--gap);
      min-width: 980px;
    }

    .month-weekday {
      text-align: center;
    }

    .month-cell {
      min-height: 140px;
      border-radius: 18px;
      border: 1px solid #dfe9f3;
      background: linear-gradient(180deg, #fcfdff 0%, #f9fbfd 100%);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .month-cell:hover {
      border-color: #bfd1e4;
      transform: translateY(-1px);
    }

    .month-cell.outside {
      opacity: 0.38;
    }

    .month-cell.weekend {
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
    }

    .month-cell.active {
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.16);
      border-color: transparent;
    }

    .month-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 800;
    }

    .month-total {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
    }

    .chip-list {
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .chip {
      border-radius: 12px;
      padding: 7px 9px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }


    .brand-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      font-size: 12px;
      font-weight: 700;
    }

    .meta-pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.9;
    }

    .meta-pill.online { color: #86efac; }
    .meta-pill.offline { color: #fde68a; }
    .meta-pill.error { color: #fca5a5; }

    

    .topbar-row.secondary {
      grid-template-columns: 1fr;
    }

    .presets-wide {
      min-height: auto;
    }

    .preset-list {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .slot {
      right: auto;
      padding-right: 42px;
      transition: box-shadow 0.16s ease, transform 0.16s ease;
    }

    .slot:hover {
      box-shadow: 0 16px 24px rgba(15, 23, 42, 0.22);
    }

    .slot.compact {
      padding: 8px 36px 12px 10px;
    }

    .slot.compact .slot-title {
      font-size: 13px;
      margin-bottom: 3px;
    }

    .slot.compact .slot-meta {
      font-size: 11px;
    }

    .slot-title {
      padding-right: 0;
      cursor: text;
      word-break: break-word;
    }

    .slot-title-input {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 3px 6px;
      font: inherit;
      font-weight: 800;
      color: #0f172a;
    }

    .slot-title-input:focus {
      outline: 2px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.12);
    }

    .slot-note,
    .slot-participants {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 700;
      opacity: 0.92;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .slot-participants {
      opacity: 0.96;
    }


    .delete-btn {
      width: 28px;
      height: 28px;
      top: 8px;
      right: 8px;
      background: rgba(255, 255, 255, 0.22);
      font-size: 20px;
      line-height: 1;
    }

    .delete-btn:hover {
      background: rgba(255, 255, 255, 0.32);
    }

    .slot-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .participant-toggle-btn {
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      min-height: 28px;
    }

    .participant-toggle-btn:hover {
      background: rgba(255, 255, 255, 0.28);
    }

    .participant-viewer-list {
      display: grid;
      gap: 10px;
      max-height: 320px;
      overflow: auto;
    }

    .participant-viewer-empty {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      padding: 8px 0;
    }

    .participant-viewer-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: #f8fbff;
      border: 1px solid #e5edf5;
    }

    .participant-viewer-name {
      font-size: 14px;
      font-weight: 700;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attend-btn {
      border: 1px solid #d7e4ef;
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      min-height: 32px;
    }

    .attend-btn.active-yes {
      background: #dcfce7;
      border-color: #86efac;
      color: #166534;
    }

    .attend-btn.active-no {
      background: #fee2e2;
      border-color: #fca5a5;
      color: #991b1b;
    }

    .viewer-close-wrap {
      display: flex;
      justify-content: flex-end;
    }

    .viewer-modal {
      width: min(520px, 100%);
    }

    .participants-section-hidden {
      display: none !important;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.34);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(760px, 100%);
      max-height: min(90vh, 920px);
      overflow: auto;
      background: #fff;
      border-radius: 26px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-head h3 {
      margin: 0;
      font-size: 22px;
    }

    .modal-grid {
      display: grid;
      gap: 12px;
    }

    .modal-grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .modal-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .modal-field {
      display: grid;
      gap: 8px;
    }

    .modal-field label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .modal-field input,
    .modal-field select,
    .modal-field textarea,
    .participant-input {
      border: 1px solid #d7e4ef;
      border-radius: 14px;
      padding: 12px 14px;
      background: #fff;
      font: inherit;
      width: 100%;
    }

    .modal-field textarea {
      min-height: 92px;
      resize: vertical;
    }

    .participant-wrap {
      display: grid;
      gap: 10px;
      border: 1px solid #e4edf6;
      border-radius: 18px;
      padding: 14px;
      background: #fbfdff;
    }

    .participant-controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 34px;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: #eef4fb;
      border: 1px solid #d9e5f2;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }

    .tag-remove {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: none;
      background: #d7e4ef;
      color: #334155;
      cursor: pointer;
      line-height: 1;
      font-weight: 800;
    }

    .tag-empty {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .participant-editor-list {
      display: grid;
      gap: 8px;
    }

    .participant-editor-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: #f8fbff;
      border: 1px solid #e5edf5;
    }

    .participant-editor-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 700;
      color: #334155;
    }

    .participant-editor-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .participant-editor-actions .attend-btn {
      min-width: 64px;
    }

    .modal-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .modal-actions-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ghost-btn,
    .solid-btn {
      border-radius: 14px;
      padding: 12px 16px;
      border: 1px solid #d7e4ef;
      background: #fff;
      cursor: pointer;
      font-weight: 800;
      font: inherit;
    }

    .ghost-btn.warn {
      color: #b91c1c;
      background: #fff5f5;
      border-color: #fecaca;
    }

    .solid-btn {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      border-color: transparent;
    }

    .hidden {
      display: none !important;
    }


    @media (max-width: 1420px) {
      .topbar-row.primary {

    function uid() {
      if (window.crypto && typeof crypto.randomUUID === "function") return crypto.randomUUID();
      return "slot-" + Date.now() + "-" + Math.random().toString(16).slice(2);

    function clamp(value, min, max) {

    }

    function snapMinutes(value) {
      return Math.round(value / SNAP) * SNAP;

    function isWeekend(date) {
      const day = date.getDay();
      return day === 0 || day === 6;
    }

    function toISO(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function parseISO(iso) {
      const [year, month, day] = String(iso || "").split("-").map(Number);
      if (!year || !month || !day) return null;
      return new Date(year, month - 1, day, 12, 0, 0, 0);
    }

    function addDays(date, days) {
      const copy = new Date(date);
      copy.setDate(copy.getDate() + days);
      return copy;
    }

    function addMonths(date, months) {
      const copy = new Date(date);
      copy.setMonth(copy.getMonth() + months);
      return copy;
    }

    function startOfWeek(date) {
      const copy = new Date(date);
      const jsDay = copy.getDay();
      const diff = jsDay === 0 ? -6 : 1 - jsDay;
      copy.setDate(copy.getDate() + diff);
      return new Date(copy.getFullYear(), copy.getMonth(), copy.getDate(), 12);
    }

    function startOfMonthGrid(date) {
      const first = new Date(date.getFullYear(), date.getMonth(), 1, 12);
      return startOfWeek(first);
    }

    function formatTime(minutesFromStart) {
      const absolute = START_HOUR * 60 + minutesFromStart;
      const h = Math.floor(absolute / 60);
      const m = absolute % 60;
      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function parseTime(text) {
      const [h, m] = String(text || "").split(":").map(Number);
      if (Number.isNaN(h) || Number.isNaN(m)) return START_HOUR * 60;
      return h * 60 + m;
    }

    function formatDuration(totalMinutes) {
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      if (h && m) return `${h} ч ${m} м`;
      if (h) return `${h} ч`;
      return `${m} м`;
    }

      const name = String(item.name || item.title || "").trim();

      const attended = item.attended === true ? true : item.attended === false ? false : null;
      return { name, attended };

    function getAttendanceStats(participants) {
      const list = Array.isArray(participants) ? participants : [];
      const total = list.length;
      const yes = list.filter((participant) => participant && participant.attended === true).length;
      const no = list.filter((participant) => participant && participant.attended === false).length;
      const pending = total - yes - no;
      return { total, yes, no, pending };
    }

      const normalized = String(raw || "").trim().toLowerCase().replace(/[^a-z0-9_-]+/g, "-");

    function getBoardFamilyIds(boardId = getBoardId()) {
      const family = BOARD_FAMILIES[boardId];

      return Array.from(new Set([boardId, ...family.map((item) => sanitizeBoardId(item, boardId))]));

    function normalizeLookupText(value) {
      return String(value ?? "")
        .trim()
        .toLowerCase()
        .replace(/ё/g, "е")
        .replace(/\s+/g, " ");
    }

    function resolveAlias(value, aliasMap) {
      const normalized = normalizeLookupText(value);
      if (!normalized) return null;
      for (const [canonical, aliases] of Object.entries(aliasMap)) {
        if (canonical === normalized) return canonical;
        if ((aliases || []).some((alias) => normalizeLookupText(alias) === normalized)) return canonical;
      }
      return null;
    }

    function normalizeTrainerId(slotLike) {
      if (!slotLike) return null;
      const candidates = [
        slotLike.trainerId,
        slotLike.trainer,
        slotLike.trainerName,
        slotLike.ownerId,
        slotLike.owner,
        slotLike.ownerName,
        slotLike.coachId,

        slotLike.userName,

        slotLike.displayName,
        slotLike.trainerDisplayName,
        slotLike.employeeName
      ];
      for (const candidate of candidates) {
        const direct = TRAINERS.find((trainer) => normalizeLookupText(trainer.id) === normalizeLookupText(candidate));
        if (direct) return direct.id;
        const byName = TRAINERS.find((trainer) => normalizeLookupText(trainer.name) === normalizeLookupText(candidate));
        if (byName) return byName.id;
        const aliased = resolveAlias(candidate, TRAINER_ALIASES);
        if (aliased) return aliased;
      }
      return null;
    }

    function normalizePresetId(slotLike) {
      if (!slotLike || typeof slotLike !== "object") return PRESETS[0].id;
      const candidates = [
        slotLike.presetId,
        slotLike.preset,
        slotLike.type,
        slotLike.category,
        slotLike.kind,
        slotLike.presetTitle,
        slotLike.activityType,
        slotLike.activity,
        slotLike.tag
      ];
      for (const candidate of candidates) {
        const direct = PRESETS.find((preset) => preset.id === String(candidate || "").trim());
        if (direct) return direct.id;
        const aliased = resolveAlias(candidate, PRESET_ALIASES);
        if (aliased) return aliased;
        const byTitle = PRESETS.find((preset) => normalizeLookupText(preset.title) === normalizeLookupText(candidate));
        if (byTitle) return byTitle.id;
      }
      const titleAlias = resolveAlias(slotLike.title || slotLike.name, PRESET_ALIASES);
      return titleAlias || PRESETS[0].id;
    }

    function coerceDateToISO(value) {
      if (!value) return null;
      if (typeof value === "string") {
        const trimmed = value.trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) return trimmed;
        if (/^\d{2}\.\d{2}\.\d{4}$/.test(trimmed)) {
          const [day, month, year] = trimmed.split(".").map(Number);
          return toISO(new Date(year, month - 1, day, 12));
        }
        const fromNative = new Date(trimmed);
        if (!Number.isNaN(fromNative.getTime())) return toISO(fromNative);
      }
      if (value && typeof value.toDate === "function") {
        const date = value.toDate();
        if (date instanceof Date && !Number.isNaN(date.getTime())) return toISO(date);
      }
      if (value instanceof Date && !Number.isNaN(value.getTime())) return toISO(value);
      return null;
    }

    function coerceRelativeMinutes(rawValue) {
      if (rawValue === null || rawValue === undefined || rawValue === "") return null;
      if (typeof rawValue === "number" && Number.isFinite(rawValue)) {
        if (rawValue >= 0 && rawValue <= TOTAL_MINUTES) return rawValue;
        if (rawValue >= START_HOUR * 60 && rawValue <= END_HOUR * 60) return rawValue - START_HOUR * 60;
        return null;
      }
      const text = String(rawValue).trim();
      if (/^\d{1,2}:\d{2}$/.test(text)) {
        return parseTime(text) - START_HOUR * 60;
      }
      if (/^-?\d+(?:\.\d+)?$/.test(text)) {
        return coerceRelativeMinutes(Number(text));
      }
      return null;
    }

    function extractStartMin(slot) {
      const directCandidates = [
        slot.startMin,
        slot.startMinute,
        slot.startMinutes,
        slot.start_offset
      ];
      for (const candidate of directCandidates) {
        const minutes = coerceRelativeMinutes(candidate);
        if (minutes !== null) return minutes;
      }

      const absoluteCandidates = [
        slot.start,
        slot.startTime,
        slot.timeStart,
        slot.from,
        slot.begin,
        slot.time
      ];
      for (const candidate of absoluteCandidates) {
        const minutes = coerceRelativeMinutes(candidate);
        if (minutes !== null) return minutes;
      }

      const rangeCandidate = String(slot.timeRange || slot.range || "").trim();
      if (rangeCandidate && rangeCandidate.includes("-")) {
        const [fromPart] = rangeCandidate.split("-");
        const minutes = coerceRelativeMinutes(fromPart.trim());
        if (minutes !== null) return minutes;
      }

      return 0;
    }

    function extractDurationMin(slot, startMin, defaultDuration) {
      const numericCandidates = [
        slot.durationMin,
        slot.duration,
        slot.durationMinutes,
        slot.length,
        slot.lengthMin,
        slot.minutes
      ];
      for (const candidate of numericCandidates) {
        const numeric = Number(candidate);
        if (Number.isFinite(numeric) && numeric > 0) return numeric;
      }

      const endCandidates = [
        slot.endMin,
        slot.endMinute,
        slot.endMinutes,
        slot.end,
        slot.endTime,
        slot.timeEnd,
        slot.to
      ];
      for (const candidate of endCandidates) {
        const endValue = coerceRelativeMinutes(candidate);
        if (endValue !== null && endValue > startMin) return endValue - startMin;
      }

      const rangeCandidate = String(slot.timeRange || slot.range || "").trim();
      if (rangeCandidate && rangeCandidate.includes("-")) {
        const [fromPart, toPart] = rangeCandidate.split("-");
        const startValue = coerceRelativeMinutes(fromPart.trim());
        const endValue = coerceRelativeMinutes(toPart.trim());
        if (startValue !== null && endValue !== null && endValue > startValue) return endValue - startValue;
      }

      return defaultDuration || 60;
    }

    function extractParticipants(slot, preset) {
      const arrays = [
        slot.participants,
        slot.attendees,
        slot.clients,
        slot.members,
        slot.students
      ];
      let source = arrays.find(Array.isArray);
      if (!source && typeof slot.participants === "string") {
        source = slot.participants.split(/[,;\n]/g).map((value) => value.trim()).filter(Boolean);
      }
      const participants = Array.isArray(source)
        ? source.map(normalizeParticipant).filter(Boolean)
        : [];
      return preset.participants ? participants : [];
    }

    function buildSlotFingerprint(slot) {
      const participantKey = (slot.participants || [])
        .map((participant) => `${normalizeLookupText(participant.name)}:${participant.attended === true ? "1" : participant.attended === false ? "0" : "_"}`)
        .join("|");
      return [
        slot.trainerId,
        slot.date,
        slot.startMin,
        slot.durationMin,
        slot.presetId,
        normalizeLookupText(slot.title),
        normalizeLookupText(slot.comment),
        participantKey
      ].join("::");
    }

    function hashString(input) {
      let hash = 0;
      const source = String(input || "");
      for (let index = 0; index < source.length; index += 1) {
        hash = (hash * 31 + source.charCodeAt(index)) >>> 0;
      }
      return hash.toString(16).padStart(8, "0");
    }

    function createStableSlotId(slot) {
      return `slot-${hashString(buildSlotFingerprint(slot))}`;
    }

    function mergeSlots(primary, secondary) {
      const primaryPreset = getPresetById(primary.presetId);
      const secondaryPreset = getPresetById(secondary.presetId);
      const preferredParticipants = (secondary.participants || []).length >= (primary.participants || []).length
        ? secondary.participants
        : primary.participants;
      const preferredTitle = (
        secondary.title &&
        normalizeLookupText(secondary.title) !== normalizeLookupText(secondaryPreset.title)
      ) ? secondary.title : (primary.title || secondary.title || primaryPreset.title);
      return {
        ...primary,
        ...secondary,
        title: preferredTitle,
        comment: secondary.comment || primary.comment || "",
        participants: Array.isArray(preferredParticipants) ? preferredParticipants : [],
        id: secondary.id || primary.id || createStableSlotId({ ...primary, ...secondary })
      };
    }

    function buildExactRangeKey(slot) {
      return [slot.trainerId, slot.date, slot.startMin, slot.durationMin].join("::");
    }

    function getSlotDetailScore(slot) {
      const preset = getPresetById(slot.presetId);
      let score = 0;
      if (slot.title && normalizeLookupText(slot.title) !== normalizeLookupText(preset.title)) score += 3;
      if (slot.comment) score += 2;
      if (Array.isArray(slot.participants)) score += slot.participants.length;
      if (slot.id && !String(slot.id).startsWith("slot-")) score += 1;
      return score;
    }

    function dedupeSlots(slots) {
      const byId = new Map();
      const byFingerprint = new Map();
      const byExactRange = new Map();

      slots.forEach((rawSlot) => {
        if (!rawSlot) return;
        const preparedSlot = {
          ...rawSlot,
          id: rawSlot.id && String(rawSlot.id).trim() ? String(rawSlot.id).trim() : null
        };
        const fingerprint = buildSlotFingerprint(preparedSlot);
        const slotId = preparedSlot.id || createStableSlotId(preparedSlot);
        preparedSlot.id = slotId;

        const existingById = byId.get(slotId);
        if (existingById) {
          const merged = mergeSlots(existingById, preparedSlot);
          byId.set(slotId, merged);
          byFingerprint.set(buildSlotFingerprint(merged), merged);
          byExactRange.set(buildExactRangeKey(merged), merged);
          return;
        }

        const existingByFingerprint = byFingerprint.get(fingerprint);
        if (existingByFingerprint) {
          const merged = mergeSlots(existingByFingerprint, preparedSlot);
          byId.delete(existingByFingerprint.id);
          byId.set(merged.id, merged);
          byFingerprint.set(buildSlotFingerprint(merged), merged);
          byExactRange.set(buildExactRangeKey(merged), merged);
          return;
        }

        const exactRangeKey = buildExactRangeKey(preparedSlot);
        const existingByRange = byExactRange.get(exactRangeKey);
        if (existingByRange) {
          const primary = getSlotDetailScore(existingByRange) >= getSlotDetailScore(preparedSlot) ? existingByRange : preparedSlot;
          const secondary = primary === existingByRange ? preparedSlot : existingByRange;
          const merged = mergeSlots(primary, secondary);
          byId.delete(existingByRange.id);
          byId.set(merged.id, merged);
          byFingerprint.set(buildSlotFingerprint(merged), merged);
          byExactRange.set(exactRangeKey, merged);
          return;
        }

        byId.set(slotId, preparedSlot);
        byFingerprint.set(fingerprint, preparedSlot);
        byExactRange.set(exactRangeKey, preparedSlot);
      });

      return Array.from(byId.values())
        .sort((a, b) => `${a.date}${String(a.startMin).padStart(4, "0")}${a.id}`.localeCompare(`${b.date}${String(b.startMin).padStart(4, "0")}${b.id}`));
    }

    function getOverlapMinutes(slotA, slotB) {
      const start = Math.max(slotA.startMin, slotB.startMin);
      const end = Math.min(slotA.startMin + slotA.durationMin, slotB.startMin + slotB.durationMin);
      return Math.max(0, end - start);
    }

    function getOverlapRatio(slotA, slotB) {
      const overlap = getOverlapMinutes(slotA, slotB);
      if (!overlap) return 0;
      return overlap / Math.max(slotA.durationMin, slotB.durationMin, 1);
    }

    function areSlotsNearDuplicate(slotA, slotB) {
      if (!slotA || !slotB) return false;
      if (slotA.trainerId !== slotB.trainerId) return false;
      if (slotA.date !== slotB.date) return false;
      if (slotA.presetId !== slotB.presetId) return false;
      const titleA = normalizeLookupText(slotA.title || getPresetById(slotA.presetId).title);
      const titleB = normalizeLookupText(slotB.title || getPresetById(slotB.presetId).title);
      if (titleA !== titleB) return false;
      return getOverlapRatio(slotA, slotB) >= 0.8;
    }

    function getConflictPriority(slot) {
      const preset = getPresetById(slot.presetId);
      let score = getSlotDetailScore(slot) * 100;
      if (slot.title && normalizeLookupText(slot.title) !== normalizeLookupText(preset.title)) score += 25;
      if (slot.comment) score += 10;
      if (Array.isArray(slot.participants)) score += slot.participants.length * 3;
      if (slot.id && !String(slot.id).startsWith("slot-")) score += 5;
      score += Math.round(slot.durationMin / SNAP);
      return score;
    }

    function choosePreferredSlot(slotA, slotB) {
      const scoreA = getConflictPriority(slotA);
      const scoreB = getConflictPriority(slotB);
      if (scoreA !== scoreB) return scoreA > scoreB ? slotA : slotB;
      if (slotA.startMin !== slotB.startMin) return slotA.startMin < slotB.startMin ? slotA : slotB;
      if (slotA.durationMin !== slotB.durationMin) return slotA.durationMin > slotB.durationMin ? slotA : slotB;
      return String(slotA.id).localeCompare(String(slotB.id)) <= 0 ? slotA : slotB;
    }

    function mergeNearDuplicateSlots(slots) {
      const result = [];
      slots.forEach((slot) => {
        const index = result.findIndex((existing) => areSlotsNearDuplicate(existing, slot));
        if (index === -1) {
          result.push(slot);
          return;
        }
        const primary = choosePreferredSlot(result[index], slot);
        const secondary = primary === result[index] ? slot : result[index];
        result[index] = mergeSlots(primary, secondary);
      });
      return result;
    }

    function resolveConflictingSlots(slots) {
      const byTrainerDay = new Map();
      slots.forEach((slot) => {
        const key = `${slot.trainerId}::${slot.date}`;
        if (!byTrainerDay.has(key)) byTrainerDay.set(key, []);
        byTrainerDay.get(key).push(slot);
      });

      const cleaned = [];
      byTrainerDay.forEach((group) => {
        const mergedGroup = mergeNearDuplicateSlots(group);
        const selected = [];
        mergedGroup
          .slice()
          .sort((a, b) => {
            const scoreDiff = getConflictPriority(b) - getConflictPriority(a);
            if (scoreDiff !== 0) return scoreDiff;
            if (a.startMin !== b.startMin) return a.startMin - b.startMin;
            if (b.durationMin !== a.durationMin) return b.durationMin - a.durationMin;
            return String(a.id).localeCompare(String(b.id));
          })
          .forEach((slot) => {
            const overlapIndex = selected.findIndex((existing) => rangesOverlap(existing.startMin, existing.durationMin, slot.startMin, slot.durationMin));
            if (overlapIndex === -1) {
              selected.push(slot);
              return;
            }

            const existing = selected[overlapIndex];
            if (areSlotsNearDuplicate(existing, slot)) {
              const primary = choosePreferredSlot(existing, slot);
              const secondary = primary === existing ? slot : existing;
              selected[overlapIndex] = mergeSlots(primary, secondary);
            }
          });

        cleaned.push(...selected);
      });

      return cleaned.sort((a, b) => `${a.date}${String(a.startMin).padStart(4, "0")}${a.id}`.localeCompare(`${b.date}${String(b.startMin).padStart(4, "0")}${b.id}`));
    }

    function normalizeResolvedSlots(rawSlots) {
      const deduped = dedupeSlots(rawSlots);
      return resolveConflictingSlots(deduped);
    }

    function normalizeSlotRecord(slot) {
      if (!slot || typeof slot !== "object") return null;
      const trainerId = normalizeTrainerId(slot);
      if (!trainerId) return null;

      const presetId = normalizePresetId(slot);
      const preset = getPresetById(presetId);
      const date = coerceDateToISO(slot.date || slot.day || slot.dateISO || slot.dateIso || slot.workDate || slot.eventDate || slot.dayDate);
      if (!date) return null;

      const startMin = clamp(snapMinutes(extractStartMin(slot)), 0, TOTAL_MINUTES - SNAP);
      const durationRaw = extractDurationMin(slot, startMin, preset.defaultDuration || 60);
      const durationMin = clamp(snapMinutes(durationRaw), SNAP, TOTAL_MINUTES - startMin);

      const titleCandidate = [
        slot.title,
        slot.name,
        slot.label,
        slot.text,
        slot.activityName
      ].find((value) => typeof value === "string" && value.trim());

      const commentCandidate = [
        slot.comment,
        slot.note,
        slot.notes,
        slot.description,
        slot.details
      ].find((value) => typeof value === "string" && value.trim());

      return {
        id: typeof slot.id === "string" && slot.id.trim() ? slot.id.trim() : null,
        trainerId,
        date,
        startMin,
        durationMin,
        presetId: preset.id,
        title: titleCandidate ? titleCandidate.trim() : preset.title,
        comment: commentCandidate ? commentCandidate.trim() : "",
        participants: extractParticipants(slot, preset)
      };
    }

    function sanitizeSlots(rawSlots) {
      if (!Array.isArray(rawSlots)) return [];
      const dropped = [];
      const normalized = rawSlots
        .map((slot) => {
          const normalizedSlot = normalizeSlotRecord(slot);
          if (!normalizedSlot) dropped.push(slot);
          return normalizedSlot;
        })
        .filter(Boolean);

      if (dropped.length) {
        console.warn("FRD: пропущены слоты с неопределенным тренером или датой", dropped.slice(0, 10));
      }

      return normalizeResolvedSlots(normalized);
    }

    function serializeSlot(slot, includeId = false) {
      const payload = {
        trainerId: slot.trainerId,
        date: slot.date,
        startMin: slot.startMin,
        durationMin: slot.durationMin,
        presetId: slot.presetId,
        title: slot.title,
        comment: slot.comment || "",
        participants: Array.isArray(slot.participants) ? slot.participants : []
      };
      return includeId ? { id: slot.id, ...payload } : payload;
    }

    function buildSlotSyncKey(slot) {
      return `${slot.id}::${buildSlotFingerprint(slot)}`;
    }

    function sameSlotSets(leftSlots, rightSlots) {
      const left = sanitizeSlots(leftSlots).map(buildSlotSyncKey).sort().join("|");
      const right = sanitizeSlots(rightSlots).map(buildSlotSyncKey).sort().join("|");
      return left === right;
    }

    function flattenRemoteTrainerSubSlots() {
      return Object.values(remoteSourceCache.trainerSubSlots).flat();
    }

    function collectMergedRemoteSlots() {
      return sanitizeSlots([
        ...remoteSourceCache.legacyDocSlots,
        ...remoteSourceCache.rootSlots,
        ...remoteSourceCache.trainerDocSlots,
        ...flattenRemoteTrainerSubSlots()
      ]);
    }

    function areRemoteSourcesLoaded() {
      return remoteLoadState.boardDoc
        && remoteLoadState.rootSlots
        && remoteLoadState.trainersCollection
        && TRAINERS.every((trainer) => remoteLoadState.trainerSubSlots[trainer.id]);
    }

    function shouldNormalizeRemoteStores(mergedSlots) {
      const trainerSubSlots = flattenRemoteTrainerSubSlots();
      if (!sameSlotSets(remoteSourceCache.rootSlots, mergedSlots)) return true;
      if (!sameSlotSets(remoteSourceCache.legacyDocSlots, mergedSlots)) return true;
      if (!sameSlotSets(remoteSourceCache.trainerDocSlots, mergedSlots)) return true;
      if (!sameSlotSets(trainerSubSlots, mergedSlots)) return true;
      return false;
    }

    function applyRemoteMergedState() {
      const mergedSlots = collectMergedRemoteSlots();

      if (remoteInitialLoadComplete) {
        state.slots = mergedSlots;
        saveSlotsLocal();
        updateSyncBadge("online", "Онлайн");
        renderAll();
        return;
      }

      if (!areRemoteSourcesLoaded()) {
        if (mergedSlots.length) {
          state.slots = mergedSlots;
          saveSlotsLocal();
          updateSyncBadge("online", "Онлайн");
          renderAll();
        }
        return;
      }

      remoteInitialLoadComplete = true;
      remoteReady = true;

      if (mergedSlots.length) {
        state.slots = mergedSlots;
        saveSlotsLocal();
      } else {
        state.slots = sanitizeSlots(state.slots);
        saveSlotsLocal();
      }

      updateSyncBadge("online", "Онлайн");
      renderAll();

      if (!remoteLegacyImportDone && !remoteLegacyImportInFlight) {
        importLegacyBoardDataIntoPrimary();
      }

      const needSeedRemote = !mergedSlots.length && state.slots.length;
      const needNormalize = mergedSlots.length && shouldNormalizeRemoteStores(mergedSlots);

      if (!remoteNormalizationAttempted && (needSeedRemote || needNormalize)) {
        remoteNormalizationAttempted = true;
        persistSlots();
      }
    }

    function cleanupRemoteSync() {
      remoteUnsubscribers.forEach((unsubscribe) => {
        try { unsubscribe(); } catch (error) { console.error(error); }
      });
      remoteUnsubscribers = [];
      remoteTrainerSlotsRefs = {};
      remoteKnownRootSlotIds = new Set();
      remoteKnownTrainerSlotIds = {};
      remoteSourceCache = {
        legacyDocSlots: [],
        rootSlots: [],
        trainerDocSlots: [],
        trainerSubSlots: {}
      };
      remoteLoadState = {
        boardDoc: false,
        rootSlots: false,
        trainersCollection: false,
        trainerSubSlots: {}
      };
      remoteInitialLoadComplete = false;
      remoteReady = false;
      remoteNormalizationAttempted = false;
      remoteLegacyImportDone = false;
      remoteLegacyImportInFlight = false;
    }

    async function fetchBoardSlots(boardId) {
      const boardRef = remoteDb.collection("frdBoards").doc(boardId);
      const trainersCollectionRef = boardRef.collection("trainers");
      const [boardDoc, rootSlotsSnap, trainerDocsSnap] = await Promise.all([
        boardRef.get(),
        boardRef.collection("slots").get(),
        trainersCollectionRef.get()
      ]);

      const trainerDocSlots = trainerDocsSnap.docs.flatMap((doc) => {
        const data = doc.data() || {};
        const docTrainerId = normalizeTrainerId({ trainerId: doc.id }) || normalizeTrainerId(data);
        const rawSlots = Array.isArray(data.slots) ? data.slots : [];
        return rawSlots.map((slot) => ({ ...slot, trainerId: normalizeTrainerId(slot) || docTrainerId }));
      });

      const trainerSubSnaps = await Promise.all(
        trainerDocsSnap.docs.map((doc) => doc.ref.collection("slots").get())
      );

      const trainerSubSlots = trainerSubSnaps.flatMap((snapshot, index) => {
        const trainerDoc = trainerDocsSnap.docs[index];
        const docTrainerId = normalizeTrainerId({ trainerId: trainerDoc.id }) || normalizeTrainerId(trainerDoc.data() || {});
        return snapshot.docs.map((doc) => ({ id: doc.id, trainerId: docTrainerId, ...doc.data() }));
      });

      const boardData = boardDoc.data() || {};
      const legacyDocSlots = Array.isArray(boardData.slots) ? boardData.slots : [];
      const rootSlots = rootSlotsSnap.docs.map((doc) => ({ id: doc.id, ...doc.data() }));

      return sanitizeSlots([
        ...legacyDocSlots,
        ...rootSlots,
        ...trainerDocSlots,
        ...trainerSubSlots
      ]);
    }

    async function importLegacyBoardDataIntoPrimary() {
      if (!syncEnabled || !remoteDb || remoteLegacyImportDone || remoteLegacyImportInFlight) return;
      const legacyBoardIds = getLegacyBoardIds();
      if (!legacyBoardIds.length) {
        remoteLegacyImportDone = true;
        return;
      }

      remoteLegacyImportInFlight = true;
      try {
        const importedLists = await Promise.all(legacyBoardIds.map((boardId) => fetchBoardSlots(boardId).catch((error) => {
          console.error(error);
          return [];
        })));
        const importedSlots = sanitizeSlots(importedLists.flat());
        remoteLegacyImportDone = true;
        if (!importedSlots.length) return;

        const merged = sanitizeSlots([...state.slots, ...importedSlots]);
        if (sameSlotSets(merged, state.slots)) return;

        state.slots = merged;
        saveSlotsLocal();
        renderAll();
        if (remoteReady) {
          await persistSlots();
        }
      } finally {
        remoteLegacyImportInFlight = false;
      }
    }

    function updateSyncBadge(mode, textValue) {
      syncStatus.textContent = textValue;
      syncStatus.className = `meta-pill ${mode}`;
      boardBadge.textContent = getBoardBadgeText();
    }

    async function initRemoteSync() {
      updateSyncBadge("offline", "Локально");
      if (!window.FRD_FIREBASE_CONFIG || !window.firebase || !firebase.apps) return;
      try {
        const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(window.FRD_FIREBASE_CONFIG);
        remoteDb = firebase.firestore(app);
        remoteBoardRef = remoteDb.collection("frdBoards").doc(getBoardId());
        remoteSlotsRef = remoteBoardRef.collection("slots");
        syncEnabled = true;
        cleanupRemoteSync();
        updateSyncBadge("offline", "Подключение...");

        remoteUnsubscribers.push(remoteBoardRef.onSnapshot((doc) => {
          const data = doc.data() || {};
          remoteSourceCache.legacyDocSlots = Array.isArray(data.slots) ? data.slots : [];
          remoteLoadState.boardDoc = true;
          applyRemoteMergedState();
        }, (error) => {
          console.error(error);
          updateSyncBadge("error", "Ошибка sync");
        }));

        remoteUnsubscribers.push(remoteSlotsRef.onSnapshot((snapshot) => {
          remoteSourceCache.rootSlots = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
          remoteKnownRootSlotIds = new Set(snapshot.docs.map((doc) => doc.id));
          remoteLoadState.rootSlots = true;
          applyRemoteMergedState();
        }, (error) => {
          console.error(error);
          updateSyncBadge("error", "Ошибка sync");
        }));

        const trainersCollectionRef = remoteBoardRef.collection("trainers");
        remoteUnsubscribers.push(trainersCollectionRef.onSnapshot((snapshot) => {
          remoteSourceCache.trainerDocSlots = snapshot.docs.flatMap((doc) => {
            const data = doc.data() || {};
            const docTrainerId = normalizeTrainerId({ trainerId: doc.id }) || normalizeTrainerId(data);
            const rawSlots = Array.isArray(data.slots) ? data.slots : [];
            return rawSlots.map((slot) => ({
              ...slot,
              trainerId: normalizeTrainerId(slot) || docTrainerId
            }));
          });
          remoteLoadState.trainersCollection = true;
          applyRemoteMergedState();
        }, (error) => {
          console.error(error);
          updateSyncBadge("error", "Ошибка sync");
        }));

        TRAINERS.forEach((trainer) => {
          const trainerSlotsRef = trainersCollectionRef.doc(trainer.id).collection("slots");
          remoteTrainerSlotsRefs[trainer.id] = trainerSlotsRef;
          remoteUnsubscribers.push(trainerSlotsRef.onSnapshot((snapshot) => {
            remoteKnownTrainerSlotIds[trainer.id] = new Set(snapshot.docs.map((doc) => doc.id));
            remoteSourceCache.trainerSubSlots[trainer.id] = snapshot.docs.map((doc) => ({
              id: doc.id,
              trainerId: trainer.id,
              ...doc.data()
            }));
            remoteLoadState.trainerSubSlots[trainer.id] = true;
            applyRemoteMergedState();
          }, (error) => {
            console.error(error);
            updateSyncBadge("error", "Ошибка sync");
          }));
        });
      } catch (error) {
        console.error(error);
        syncEnabled = false;
        remoteReady = false;
        updateSyncBadge("error", "Ошибка sync");
      }
    }

    async function collectKnownBoardIdsForSync(boardRef, boardId) {
      if (boardId === getBoardId()) {
        return {
          rootIds: new Set(remoteKnownRootSlotIds),
          trainerIdsByTrainer: Object.fromEntries(TRAINERS.map((trainer) => [trainer.id, new Set(remoteKnownTrainerSlotIds[trainer.id] || [])]))
        };
      }

      const rootSnapshot = await boardRef.collection("slots").get();
      const trainerIdsByTrainer = {};
      await Promise.all(TRAINERS.map(async (trainer) => {
        const trainerSnapshot = await boardRef.collection("trainers").doc(trainer.id).collection("slots").get();
        trainerIdsByTrainer[trainer.id] = new Set(trainerSnapshot.docs.map((doc) => doc.id));
      }));

      return {
        rootIds: new Set(rootSnapshot.docs.map((doc) => doc.id)),
        trainerIdsByTrainer
      };
    }

    async function persistBoardSlots(boardId, normalizedSlots) {
      const boardRef = remoteDb.collection("frdBoards").doc(boardId);
      const slotsRef = boardRef.collection("slots");
      const knownIds = await collectKnownBoardIdsForSync(boardRef, boardId);
      const batch = remoteDb.batch();
      const rootIds = new Set();

      batch.set(boardRef, {
        boardId,
        version: 5,
        slots: normalizedSlots.map((slot) => serializeSlot(slot, true)),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });

      normalizedSlots.forEach((slot) => {
        rootIds.add(slot.id);
        batch.set(slotsRef.doc(slot.id), {
          ...serializeSlot(slot),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      });

      knownIds.rootIds.forEach((slotId) => {
        if (!rootIds.has(slotId)) {
          batch.delete(slotsRef.doc(slotId));
        }
      });

      TRAINERS.forEach((trainer) => {
        const trainerSlots = normalizedSlots.filter((slot) => slot.trainerId === trainer.id);
        const trainerDocRef = boardRef.collection("trainers").doc(trainer.id);
        const trainerSubRef = trainerDocRef.collection("slots");
        const trainerIds = new Set();

        batch.set(trainerDocRef, {
          trainerId: trainer.id,
          name: trainer.name,
          slots: trainerSlots.map((slot) => serializeSlot(slot, true)),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        trainerSlots.forEach((slot) => {
          trainerIds.add(slot.id);
          batch.set(trainerSubRef.doc(slot.id), {
            ...serializeSlot(slot),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
        });

        (knownIds.trainerIdsByTrainer[trainer.id] || new Set()).forEach((slotId) => {
          if (!trainerIds.has(slotId)) {
            batch.delete(trainerSubRef.doc(slotId));
          }
        });

        if (boardId === getBoardId()) {
          remoteKnownTrainerSlotIds[trainer.id] = trainerIds;
        }
      });

      await batch.commit();
      if (boardId === getBoardId()) {
        remoteKnownRootSlotIds = rootIds;
      }
    }

    async function persistSlots() {
      state.slots = sanitizeSlots(state.slots);
      saveSlotsLocal();
      if (!syncEnabled || !remoteBoardRef || !remoteSlotsRef || !remoteReady) return;

      try {
        const normalizedSlots = sanitizeSlots(state.slots);
        const familyBoardIds = getBoardFamilyIds();
        await Promise.all(familyBoardIds.map((boardId) => persistBoardSlots(boardId, normalizedSlots)));
        updateSyncBadge("online", "Онлайн");
      } catch (error) {
        console.error(error);
        updateSyncBadge("error", "Ошибка sync");
      }
    }

    function getFilteredSlots() {
      return state.slots.filter((slot) => slot.trainerId === state.selectedTrainerId);
    }

    function getSlotsForTrainer(trainerId) {
      return state.slots.filter((slot) => slot.trainerId === trainerId);
    }

    function getVisibleDates() {
      const cursor = parseISO(state.cursorDate) || new Date();
      if (state.view === "day") return [cursor];
      if (state.view === "week") {
        const monday = startOfWeek(cursor);
        return Array.from({ length: 5 }, (_, index) => addDays(monday, index));
      }
      return [];
    }

    function getPeriodBounds() {
      const cursor = parseISO(state.cursorDate) || new Date();
      if (state.view === "day") {
        return { start: toISO(cursor), end: toISO(cursor) };
      }
      if (state.view === "week") {
        const monday = startOfWeek(cursor);
        const friday = addDays(monday, 4);
        return { start: toISO(monday), end: toISO(friday) };
      }
      const first = new Date(cursor.getFullYear(), cursor.getMonth(), 1, 12);
      const last = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0, 12);
      return { start: toISO(first), end: toISO(last) };
    }

    function slotInPeriod(slot) {
      const bounds = getPeriodBounds();
      return slot.date >= bounds.start && slot.date <= bounds.end;
    }

    function getTrainerMinutesForPeriod(trainerId) {
      return state.slots
        .filter((slot) => slot.trainerId === trainerId && slotInPeriod(slot))
        .reduce((sum, slot) => sum + slot.durationMin, 0);
    }

    function renderTimeAxis() {
      const labels = [];

    }

    function buildDayLayouts(slots) {
      const normalized = slots
        .map((slot) => ({ slot, startMin: slot.startMin, endMin: slot.startMin + slot.durationMin }))
        .sort((a, b) => a.startMin - b.startMin || a.endMin - b.endMin || a.slot.id.localeCompare(b.slot.id));
      const layouts = new Map();
      let group = [];
      let groupEnd = -Infinity;

      function flushGroup() {
        if (!group.length) return;
        const columnEnds = [];
        const assigned = [];
        let maxColumns = 1;

        group.forEach((item) => {
          let columnIndex = columnEnds.findIndex((end) => end <= item.startMin);
          if (columnIndex === -1) {
            columnIndex = columnEnds.length;
            columnEnds.push(item.endMin);
          } else {
            columnEnds[columnIndex] = item.endMin;
          }
          maxColumns = Math.max(maxColumns, columnEnds.length);
          assigned.push({ item, columnIndex });
        });

        assigned.forEach(({ item, columnIndex }) => {
          layouts.set(item.slot.id, {
            columnIndex,
            columns: maxColumns,
            startMin: item.startMin,
            endMin: item.endMin
          });
        });

        group = [];
        groupEnd = -Infinity;
      }

      normalized.forEach((item) => {
        if (!group.length || item.startMin < groupEnd) {
          group.push(item);
          groupEnd = Math.max(groupEnd, item.endMin);
        } else {
          flushGroup();
          group.push(item);
          groupEnd = item.endMin;
        }
      });

      flushGroup();
      return layouts;
    }


    function renderSlot(slot, layout) {
      const preset = getPresetById(slot.presetId);
      const trainer = getTrainerById(slot.trainerId);
      const top = slot.startMin * PX_PER_MINUTE;
      const height = slot.durationMin * PX_PER_MINUTE;
      const columns = Math.max(layout?.columns || 1, 1);
      const columnIndex = Math.max(layout?.columnIndex || 0, 0);
      const gap = columns > 1 ? 6 : 0;
      const widthStyle = columns > 1
        ? `left:calc(8px + (((100% - 16px - ${(columns - 1) * gap}px) / ${columns}) * ${columnIndex}) + ${columnIndex * gap}px); width:calc((100% - 16px - ${(columns - 1) * gap}px) / ${columns});`
        : "left:8px; width:calc(100% - 16px);";
      const activeClass = interaction && interaction.slotId === slot.id ? (interaction.mode === "drag" ? "dragging" : "resizing") : "";
      const compact = height < 92 ? "compact" : "";
      const noteText = slot.comment && height >= 118 ? `<span class="slot-note">${escapeHtml(slot.comment)}</span>` : "";
      const attendance = getAttendanceStats(slot.participants || []);
      const showParticipants = preset.participants && attendance.total > 0;
      const participantsText = showParticipants
        ? `<span class="slot-participants">Явка: ${attendance.yes}/${attendance.total}${attendance.pending ? ` · без отметки ${attendance.pending}` : ""}</span>`
        : "";
      const participantsButton = showParticipants && height >= 92
        ? `<div class="slot-actions"><button class="participant-toggle-btn" type="button" data-open-participants="${slot.id}">Отметить явку</button></div>`
        : "";
      return `
        <div class="slot ${activeClass} ${compact}" data-id="${slot.id}" style="top:${top}px; height:${height}px; ${widthStyle} background:${preset.color};" title="${escapeHtml(trainer.name)} · ${escapeHtml(slot.title)}">
          <button class="delete-btn" type="button" aria-label="Удалить">×</button>
          <div class="slot-title" data-title-id="${slot.id}">${escapeHtml(slot.title)}</div>
          <div class="slot-meta">${formatTime(slot.startMin)}–${formatTime(slot.startMin + slot.durationMin)}</div>
          ${noteText}
          ${participantsText}
          ${participantsButton}
          <div class="resize-handle"></div>
        </div>
      `;
    }

    function renderWeekOrDay() {
      const dates = getVisibleDates();
      const isDay = state.view === "day";
      document.documentElement.style.setProperty("--cols", String(dates.length));
      const headerClass = isDay ? "day-header-row" : "week-header";
      const daysClass = isDay ? "days-grid day" : "days-grid week";

      const headers = dates.map((date) => {
        const weekend = isWeekend(date);
        return `<div class="day-header">${isDay ? formatDateLabel(date) : WEEKDAY_LONG[getWeekdayIndex(date)]}<small>${weekend ? "выходной" : String(date.getDate()).padStart(2, "0") + "." + String(date.getMonth() + 1).padStart(2, "0")}</small></div>`;
      }).join("");

      const columns = dates.map((date) => {
        const iso = toISO(date);
        const weekend = isWeekend(date);
        const daySlots = getFilteredSlots().filter((slot) => slot.date === iso).sort((a, b) => a.startMin - b.startMin || a.durationMin - b.durationMin);
        const layouts = buildDayLayouts(daySlots);
        return `
          <div class="day-column ${weekend ? "weekend" : ""}" data-date="${iso}" aria-label="${formatDateLabel(date)}">
            ${weekend ? '<div class="weekend-center">Выходной</div>' : daySlots.map((slot) => renderSlot(slot, layouts.get(slot.id))).join("")}
          </div>
        `;
      }).join("");

      boardContent.innerHTML = `
        <div class="${headerClass}">
          <div class="time-head">Время</div>
          ${headers}
        </div>
        <div class="grid-wrap">
          ${renderTimeAxis()}
          <div class="${daysClass}" id="daysGrid">${columns}</div>
        </div>
      `;
    }

    function renderMonth() {
      const cursor = parseISO(state.cursorDate) || new Date();
      const start = startOfMonthGrid(cursor);
      const days = Array.from({ length: 42 }, (_, index) => addDays(start, index));
      const trainerSlots = getFilteredSlots();
      boardContent.innerHTML = `
        <div class="month-grid">
          ${WEEKDAY_LABELS.map((label) => `<div class="month-weekday">${label}</div>`).join("")}
          ${days.map((date) => {
            const iso = toISO(date);
            const isCurrentMonth = date.getMonth() === cursor.getMonth();
            const weekend = isWeekend(date);
            const daySlots = trainerSlots.filter((slot) => slot.date === iso).sort((a, b) => a.startMin - b.startMin);
            const total = daySlots.reduce((sum, slot) => sum + slot.durationMin, 0);
            return `
              <div class="month-cell ${isCurrentMonth ? "" : "outside"} ${weekend ? "weekend" : ""} ${iso === state.cursorDate ? "active" : ""}" data-month-date="${iso}">
                <div class="month-top">
                  <span>${date.getDate()}</span>
                  <span class="month-total">${total ? formatDuration(total) : ""}</span>
                </div>
                <div class="chip-list">
                  ${daySlots.slice(0, 5).map((slot) => {
                    const preset = getPresetById(slot.presetId);
                    return `<div class="chip" style="background:${preset.color}">${formatTime(slot.startMin)} ${escapeHtml(slot.title)}</div>`;
                  }).join("")}
                  ${daySlots.length > 5 ? `<div class="month-total">ещё ${daySlots.length - 5}</div>` : ""}
                  ${!daySlots.length && weekend ? '<div class="month-total">выходной</div>' : ""}
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }
